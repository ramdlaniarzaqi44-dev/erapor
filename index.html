            const [tab, setTab] = useState('kelas');
            const [selKelas, setSelKelas] = useState('');
            const [selTingkat, setSelTingkat] = useState('');

            const availableClasses = data.kelas || [];
            const availableTingkat = [...new Set((data.kelas || []).map(k => k.tingkat))];

            useEffect(() => { if (!selKelas && availableClasses.length > 0) setSelKelas(availableClasses[0].nama); }, [availableClasses, selKelas]);
            useEffect(() => { if (!selTingkat && availableTingkat.length > 0) setSelTingkat(availableTingkat[0]); }, [availableTingkat, selTingkat]);

            const getProp = (m, prop, kelasName) => m[`${prop}_per_kelas`] && m[`${prop}_per_kelas`][kelasName] !== undefined ? m[`${prop}_per_kelas`][kelasName] : m[prop];

            const getStudentFinalScore = (s, m) => {
                const isKelas12 = s.kelas && (s.kelas.toUpperCase().startsWith('XII') || s.kelas.startsWith('12'));
                const val = (data.nilaiMapel || []).find(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(m.id)) || {};
                const sum = [val.s1, val.s2, val.s3, val.s4, val.s5].map(v => parseInt(v) || 0).filter(v => v > 0);
                const rerata = sum.length ? Math.round(sum.reduce((a, b) => a + b, 0) / sum.length) : 0;
                const stsVal = parseInt(val.sts) || 0;
                const sasVal = parseInt(val.sas) || 0;
                const komps = [rerata, (!isKelas12 ? stsVal : 0), sasVal].filter(v => v > 0);
                return komps.length > 0 ? Math.round(komps.reduce((a, b) => a + b, 0) / komps.length) : 0;
            };

            const rankKelasMapels = useMemo(() => (data.mapel || []).filter(m => m.aktif !== false && m.kelompok !== 'C' && m.kelas?.includes(selKelas)).sort((a,b) => getProp(a, 'urutan', selKelas) - getProp(b, 'urutan', selKelas)), [data.mapel, selKelas]);
            
            const rankKelasData = useMemo(() => {
                let d = (data.siswa || []).filter(s => s.kelas === selKelas).map(s => {
                    let total = 0; const scores = {};
                    rankKelasMapels.forEach(m => { const score = getStudentFinalScore(s, m); scores[m.id] = score; total += score; });
                    return { ...s, scores, total };
                }).sort((a,b) => b.total - a.total);
                return d.map((s, index) => ({ ...s, rank: index + 1 }));
            }, [data.siswa, selKelas, rankKelasMapels]);

            const classesInTingkat = useMemo(() => (data.kelas || []).filter(k => k.tingkat === selTingkat).map(k => k.nama), [data.kelas, selTingkat]);
            const angkatanMapels = useMemo(() => (data.mapel || []).filter(m => m.aktif !== false && m.kelas?.some(c => classesInTingkat.includes(c))).sort((a,b) => a.urutan - b.urutan), [data.mapel, classesInTingkat]);
            const mapelUmum = useMemo(() => angkatanMapels.filter(m => m.kelompok !== 'C'), [angkatanMapels]);
            const mapelPondok = useMemo(() => angkatanMapels.filter(m => m.kelompok === 'C'), [angkatanMapels]);

            const rankAngkatanData = useMemo(() => {
                let d = (data.siswa || []).filter(s => classesInTingkat.includes(s.kelas)).map(s => {
                    let total = 0; const scores = {};
                    angkatanMapels.forEach(m => {
                        if (m.kelas?.includes(s.kelas)) { const score = getStudentFinalScore(s, m); scores[m.id] = score; total += score; } 
                        else { scores[m.id] = '-'; }
                    });
                    return { ...s, scores, total };
                }).sort((a,b) => b.total - a.total);
                return d.map((s, index) => ({ ...s, rank: index + 1 }));
            }, [data.siswa, classesInTingkat, angkatanMapels]);

            const downloadExcel = () => {
                let headers = []; let rows = []; let filename = "";
                if (tab === 'kelas') {
                    if (!selKelas) return notify('Pilih kelas dulu', 'error');
                    headers = ['RANK', 'NISN', 'NAMA', 'L/P', ...rankKelasMapels.map(m => m.nama), 'TOTAL'];
                    rows = rankKelasData.map(s => [s.rank, s.nisn, s.nama, s.jenis_kelamin || '-', ...rankKelasMapels.map(m => s.scores[m.id]), s.total]);
                    filename = `Ranking_Kelas_${selKelas}.xlsx`;
                } else {
                    if (!selTingkat) return notify('Pilih tingkat/angkatan dulu', 'error');
                    headers = ['RANK', 'NISN', 'NAMA', 'KELAS', 'L/P', ...mapelUmum.map(m => `(U) ${m.nama}`), ...mapelPondok.map(m => `(P) ${m.nama}`), 'TOTAL'];
                    rows = rankAngkatanData.map(s => [s.rank, s.nisn, s.nama, s.kelas, s.jenis_kelamin || '-', ...mapelUmum.map(m => s.scores[m.id]), ...mapelPondok.map(m => s.scores[m.id]), s.total]);
                    filename = `Ranking_Angkatan_${selTingkat}.xlsx`;
                }
                const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]); 
                XLSX.utils.book_append_sheet(wb, ws, "Ranking"); XLSX.writeFile(wb, filename);
            };

            return (
                <div className="space-y-6 animate-fade">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                        <h2 className="text-xl font-bold">Perangkingan Siswa</h2>
                        <button onClick={downloadExcel} className="bg-emerald-600 text-white px-4 py-2 rounded-lg flex gap-2 shadow hover:bg-emerald-700 transition items-center font-medium text-sm"><Icon name="download" size={16}/> Download Excel</button>
                    </div>
                    
                    <div className="flex border-b border-slate-200 mb-4">
                        <button onClick={() => setTab('kelas')} className={`px-6 py-3 font-medium text-sm transition ${tab === 'kelas' ? 'text-secondary border-b-2 border-secondary bg-slate-50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}>Ranking Kelas</button>
                        <button onClick={() => setTab('angkatan')} className={`px-6 py-3 font-medium text-sm transition ${tab === 'angkatan' ? 'text-secondary border-b-2 border-secondary bg-slate-50' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-50'}`}>Ranking Angkatan</button>
                    </div>

                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                        {tab === 'kelas' && (
                            <div className="space-y-4">
                                <div className="max-w-xs"><label className="block text-sm font-medium text-slate-700 mb-1">Pilih Kelas</label><select className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-secondary" value={selKelas} onChange={e=>setSelKelas(e.target.value)}><option value="">-- Pilih --</option>{availableClasses.map(k=><option key={k.id} value={k.nama}>{k.nama}</option>)}</select></div>
                                {selKelas && (
                                    <div className="border rounded-lg overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-50 border-b">
                                                <tr><th className="p-3 text-center w-12 bg-amber-50">Rank</th><th className="p-3 min-w-[200px] sticky left-0 bg-slate-50 border-r">Nama Siswa</th>{rankKelasMapels.map(m => <th key={m.id} className="p-2 text-center text-xs whitespace-nowrap min-w-[80px]">{m.nama}</th>)}<th className="p-3 text-center w-20 bg-emerald-50 border-l">Total</th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {rankKelasData.map(s => (
                                                    <tr key={s.id} className="hover:bg-slate-50"><td className="p-3 text-center font-bold bg-amber-50/50 text-amber-700">{s.rank}</td><td className="p-3 font-medium sticky left-0 bg-white border-r">{s.nama}</td>{rankKelasMapels.map(m => <td key={m.id} className="p-2 text-center text-slate-600">{s.scores[m.id]}</td>)}<td className="p-3 text-center font-bold bg-emerald-50/50 border-l text-emerald-700">{s.total}</td></tr>
                                                ))}
                                                {rankKelasData.length === 0 && <tr><td colSpan={rankKelasMapels.length + 3} className="p-8 text-center text-slate-400">Tidak ada data.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                        {tab === 'angkatan' && (
                            <div className="space-y-4">
                                <div className="p-3 bg-blue-50 text-blue-800 rounded-lg text-sm flex gap-2"><Icon name="info" size={16} className="shrink-0 mt-0.5"/><span>Ranking Angkatan menjumlahkan nilai <b>seluruh mapel (Umum & Pondok)</b> yang diikuti siswa. Siswa yang tidak mengambil mapel tertentu akan ditandai dengan strip (-).</span></div>
                                <div className="max-w-xs"><label className="block text-sm font-medium text-slate-700 mb-1">Pilih Angkatan / Tingkat</label><select className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-secondary" value={selTingkat} onChange={e=>setSelTingkat(e.target.value)}><option value="">-- Pilih --</option>{availableTingkat.map(t=><option key={t} value={t}>Angkatan Kelas {t}</option>)}</select></div>
                                {selTingkat && (
                                    <div className="border rounded-lg overflow-x-auto">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-slate-50 border-b">
                                                <tr><th rowSpan="2" className="p-3 text-center w-12 bg-amber-50 border-b-0">Rank</th><th rowSpan="2" className="p-3 min-w-[200px] sticky left-0 bg-slate-50 border-r border-b-0 z-10">Nama Siswa</th><th rowSpan="2" className="p-3 text-center border-r border-b-0">Kelas</th>{mapelUmum.length > 0 && <th colSpan={mapelUmum.length} className="p-2 text-center bg-blue-50 border-b">Mapel Umum</th>}{mapelPondok.length > 0 && <th colSpan={mapelPondok.length} className="p-2 text-center bg-indigo-50 border-b border-l">Mapel Pondok</th>}<th rowSpan="2" className="p-3 text-center w-20 bg-emerald-50 border-l border-b-0">Total</th></tr>
                                                <tr>{mapelUmum.map(m => <th key={`u-${m.id}`} className="p-2 text-center text-[10px] whitespace-nowrap min-w-[80px] bg-blue-50/50">{m.nama}</th>)}{mapelPondok.map(m => <th key={`p-${m.id}`} className="p-2 text-center text-[10px] whitespace-nowrap min-w-[80px] bg-indigo-50/50 border-l font-pegon">{m.nama}</th>)}</tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {rankAngkatanData.map(s => (
                                                    <tr key={s.id} className="hover:bg-slate-50"><td className="p-3 text-center font-bold bg-amber-50/50 text-amber-700">{s.rank}</td><td className="p-3 font-medium sticky left-0 bg-white border-r z-10">{s.nama}</td><td className="p-2 text-center border-r font-medium text-xs">{s.kelas}</td>{mapelUmum.map(m => <td key={m.id} className="p-2 text-center text-slate-600">{s.scores[m.id]}</td>)}{mapelPondok.map(m => <td key={m.id} className="p-2 text-center text-slate-600 border-l">{s.scores[m.id]}</td>)}<td className="p-3 text-center font-bold bg-emerald-50/50 border-l text-emerald-700">{s.total}</td></tr>
                                                ))}
                                                {rankAngkatanData.length === 0 && <tr><td colSpan={mapelUmum.length + mapelPondok.length + 4} className="p-8 text-center text-slate-400">Tidak ada data.</td></tr>}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const CetakRaporSelector = ({ data, handlePrint, user, type }) => {
            const [selKelas, setSelKelas] = useState(''); 
            
            const availableClasses = useMemo(() => { 
                if (user.role === 'admin') return data.kelas || []; 
                let profiles = [];
                let primaryMatch = null;
                if (user.id && String(user.id).startsWith('usr-g-')) { primaryMatch = (data.guru || []).find(g => String(g.id) === String(user.id.replace('usr-g-', ''))); }
                if (!primaryMatch && user.nip && String(user.nip).trim() !== '' && String(user.nip).trim() !== '-') { primaryMatch = (data.guru || []).find(g => String(g.nip).trim() === String(user.nip).trim()); }
                if (!primaryMatch && user.nama) { primaryMatch = (data.guru || []).find(g => g.nama && String(g.nama).trim().toLowerCase() === String(user.nama).trim().toLowerCase()); }

                if (primaryMatch) {
                    profiles = (data.guru || []).filter(g => {
                        const hasValidNip = primaryMatch.nip && String(primaryMatch.nip).trim() !== '-' && String(primaryMatch.nip).trim() !== '';
                        const sameNip = hasValidNip && g.nip && String(g.nip).trim() === String(primaryMatch.nip).trim();
                        const hasValidName = primaryMatch.nama && String(primaryMatch.nama).trim() !== '';
                        const sameName = hasValidName && g.nama && String(g.nama).trim().toLowerCase() === String(primaryMatch.nama).trim().toLowerCase();
                        return sameNip || sameName;
                    });
                }

                const walasClasses = new Set();
                profiles.forEach(g => {
                    const tasks = Array.isArray(g.tugasTambahan) ? g.tugasTambahan : (g.tugasTambahan ? g.tugasTambahan.split(',') : []);
                    tasks.forEach(t => {
                        if (t.toLowerCase().includes('wali kelas')) {
                            const walasClassName = t.replace(/wali kelas/i, '').trim();
                            walasClasses.add(walasClassName);
                        }
                    });
                });

                if (walasClasses.size > 0) {
                     return (data.kelas || []).filter(k => walasClasses.has(k.nama));
                }
                return []; 
            }, [data.kelas, user, data.guru]);

            useEffect(() => { if (availableClasses.length === 1 && !selKelas) { setSelKelas(availableClasses[0].nama); } }, [availableClasses, selKelas]);
            const students = useMemo(() => selKelas ? (data.siswa || []).filter(s => s.kelas === selKelas) : [], [data.siswa, selKelas]);
            const title = type === 'pondok' ? 'Cetak Rapor Pondok (Pegon)' : 'Cetak Rapor Sisipan';
            
            return (
                <div className="space-y-6 animate-fade">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm"><h2 className="text-xl font-bold">{title}</h2></div>
                    <div className="bg-white p-6 rounded-xl border shadow-sm">
                        <div className="mb-6 max-w-xs"><label className="block text-sm font-medium text-slate-700 mb-1">Pilih Kelas</label><select className="w-full p-2 border rounded-lg outline-none focus:ring-2 focus:ring-blue-500" value={selKelas} onChange={e => setSelKelas(e.target.value)}><option value="">-- Pilih Kelas --</option>{availableClasses.map(k => (<option key={k.id} value={k.nama}>{k.nama}</option>))}</select></div>
                        {selKelas && (<div className="animate-fade space-y-6"><div><h3 className="font-bold text-lg text-slate-800 mb-3">Daftar Siswa</h3><div className="border rounded-lg overflow-hidden"><table className="w-full text-sm text-left"><thead className="bg-slate-50 border-b"><tr><th className="p-3 w-12 text-center">No</th><th className="p-3">Nomor Induk</th><th className="p-3">Nama Siswa</th><th className="p-3 text-center">L/P</th><th className="p-3 text-right">Aksi</th></tr></thead><tbody className="divide-y">{students.length > 0 ? students.map((s, i) => (<tr key={s.id} className="hover:bg-slate-50"><td className="p-3 text-center text-slate-500">{i+1}</td><td className="p-3">{s.nisn}</td><td className="p-3 font-medium">{s.nama}</td><td className="p-3 text-center">{s.jenis_kelamin || '-'}</td><td className="p-3 text-right"><button onClick={() => handlePrint([s], type)} className="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded hover:bg-slate-50 transition text-xs font-medium inline-flex items-center gap-1"><Icon name="printer" size={14}/> Cetak {type === 'pondok' ? 'Pondok' : ''}</button></td></tr>)) : (<tr><td colSpan="5" className="p-6 text-center text-slate-400">Tidak ada siswa di kelas ini.</td></tr>)}</tbody></table></div></div></div>)}
                    </div>
                </div>
            );
        };

        const PrintRapor = ({ data, siswa }) => {
            const { sekolah, mapel, nilaiMapel, ekskulRef, nilaiEkskul, absensi, logo } = data;
            const myAbsen = (absensi || []).find(a => String(a.siswa_id) === String(siswa.id)) || {sakit:'',izin:'',alpa:''};
            const waliKelasName = ((logo || {}).wali_kelas_per_kelas && (logo || {}).wali_kelas_per_kelas[siswa.kelas]) || (logo || {}).wali_kelas || "Wali Kelas";
            const isKelas12 = siswa.kelas && (siswa.kelas.toUpperCase().startsWith('XII') || siswa.kelas.startsWith('12'));

            const calcScore = (val) => {
                 if(!val) return { rerata:'', akhir:'', predikat:'-' };
                 const sum = [val.s1,val.s2,val.s3,val.s4,val.s5].map(v=>parseInt(v)||0).filter(v=>v>0);
                 const rerata = sum.length ? Math.round(sum.reduce((a,b)=>a+b,0)/sum.length) : '';
                 
                 const stsVal = parseInt(val.sts) || 0;
                 const sasVal = parseInt(val.sas) || 0;
                 
                 if (rerata === '' && stsVal === 0 && sasVal === 0) return { rerata:'', akhir:'', predikat:'-' };
                 
                 const realRerata = rerata === '' ? 0 : rerata;
                 
                 let komps = [];
                 if (realRerata > 0) komps.push(realRerata);
                 if (!isKelas12 && stsVal > 0) komps.push(stsVal);
                 if (sasVal > 0) komps.push(sasVal);
                 const akhir = komps.length > 0 ? Math.round(komps.reduce((a,b)=>a+b,0) / komps.length) : 0;
                 
                 let predikat = 'D'; if(akhir >= 92) predikat = 'A'; else if(akhir >= 83) predikat = 'B'; else if(akhir >= 75) predikat = 'C';
                 return { rerata, akhir, predikat };
            };

            const getProp = (m, prop) => m[`${prop}_per_kelas`] && m[`${prop}_per_kelas`][siswa.kelas] !== undefined ? m[`${prop}_per_kelas`][siswa.kelas] : m[prop];
            const sortedMapel = (mapel || []).filter(m => { 
                if(m.aktif === false) return false; 
                if(!m.kelas || !m.kelas.includes(siswa.kelas)) return false; 
                return true; 
            }).sort((a,b) => getProp(a, 'urutan') - getProp(b, 'urutan'));
            
            const processedParents = new Set();
            
            const renderRow = (m) => {
                const val = (nilaiMapel || []).find(n => String(n.siswa_id) === String(siswa.id) && String(n.mapel_id) === String(m.id)) || {}; 
                const score = calcScore(val);
                const mUrutan = getProp(m, 'urutan');
                const mKkm = getProp(m, 'kkm');
                return (<tr key={m.id}><td className="text-center">{mUrutan}</td><td className="pl-1 truncate max-w-[150px]">{m.nama}</td><td className="text-center">{mKkm}</td><td className="text-center">{val.s1||'-'}</td><td className="text-center">{val.s2||'-'}</td><td className="text-center">{val.s3||'-'}</td><td className="text-center">{val.s4||'-'}</td><td className="text-center">{val.s5||'-'}</td><td className="text-center font-bold bg-white">{score.rerata||''}</td>{!isKelas12 && <td className="text-center">{val.sts||'-'}</td>}<td className="text-center font-bold bg-white">{score.akhir||''}</td><td className="text-center">{score.predikat}</td></tr>);
            };

            const renderGroupWithHeader = (grp, title) => {
                const groupItems = sortedMapel.filter(m => getProp(m, 'kelompok') === grp); 
                if (groupItems.length === 0) return null; 
                return (<React.Fragment key={grp}><tr className="font-bold"><td colSpan={isKelas12 ? "11" : "12"} className="pl-2 py-0.5 text-[11px]">{title}</td></tr>{groupItems.map(m => { const mParent = getProp(m, 'parent') || ''; if (mParent) { if (!processedParents.has(mParent)) { processedParents.add(mParent); return <React.Fragment key={`grp-${mParent}`}><tr className="bg-white font-bold italic"><td colSpan={isKelas12 ? "11" : "12"} className="pl-2 py-0.5 text-[11px]">{mParent}</td></tr>{renderRow(m)}</React.Fragment>; } return renderRow(m); } return renderRow(m); })}</React.Fragment>);
            };

            const myEkskulList = (nilaiEkskul || []).filter(n => String(n.siswa_id) === String(siswa.id)).map(n => { const ref = (ekskulRef || []).find(e => String(e.id) === String(n.ekskul_id)); return { nama: ref?.nama || '-', predikat: n.predikat }; });
            return (
                <div className="w-full h-full bg-white text-black p-0 page-break relative text-[11pt]">
                    <div className="flex items-center justify-between border-b-4 border-double border-black pb-2 mb-2"><div className="w-16 h-16 flex items-center justify-center font-bold text-center text-xs">{(logo || {}).image ? (<img src={logo.image} alt="Logo" className="w-full h-full object-contain" onError={(e) => e.target.style.display = 'none'} />) : "LOGO"}</div><div className="text-center flex-1"><h1 className="font-bold text-lg uppercase leading-tight">LAPORAN HASIL BELAJAR TENGAH SEMESTER</h1><h2 className="font-bold text-md">{(sekolah || {}).nama}</h2><p className="text-[11px]">{(sekolah || {}).alamat}</p></div><div className="w-16"></div></div>
                    <div className="flex justify-between mb-2 text-[11px] font-sans"><table className="w-[60%]"><tbody><tr><td className="w-24">Nama</td><td className="w-2">:</td><td className="font-bold uppercase">{siswa.nama}</td></tr><tr><td>Nomor Induk</td><td>:</td><td>{siswa.nisn}</td></tr><tr><td>Kelas</td><td>:</td><td>{siswa.kelas} / {siswa.fase}</td></tr></tbody></table><table className="w-[35%]"><tbody><tr><td className="w-24">Tahun Ajaran</td><td className="w-2">:</td><td>{(sekolah || {}).tahunPelajaran}</td></tr><tr><td>Semester</td><td>:</td><td>{(sekolah || {}).semester}</td></tr></tbody></table></div>
                    <h3 className="font-bold mb-0.5 text-[12px] underline">A. Nilai Akademik</h3><table className="print-table mb-2"><thead className="text-center font-bold"><tr><th rowSpan="2" className="w-6">No</th><th rowSpan="2">Mata Pelajaran</th><th rowSpan="2" className="w-8">KKM</th><th colSpan="5" className="h-4">Sumatif</th><th rowSpan="2" className="w-8">Rata</th>{!isKelas12 && <th rowSpan="2" className="w-8">STS</th>}<th rowSpan="2" className="w-8">Akhir</th><th rowSpan="2" className="w-8">Pred</th></tr><tr className="text-[11px]"><th className="w-6">1</th><th className="w-6">2</th><th className="w-6">3</th><th className="w-6">4</th><th className="w-6">5</th></tr></thead><tbody>{renderGroupWithHeader('A', 'Kelompok A (Umum)')}{renderGroupWithHeader('B', 'Kelompok B (Muatan Lokal)')}{renderGroupWithHeader('C', 'Kelompok C (Peminatan)')}</tbody></table>
                    <div className="flex gap-2 mb-4"><div className="flex-1"><h3 className="font-bold mb-0.5 text-[12px] underline">B. Ekstrakurikuler</h3><table className="print-table w-full"><thead className=""><tr><th className="w-6">No</th><th>Kegiatan</th><th className="w-12">Predikat</th></tr></thead><tbody>{myEkskulList.length > 0 ? myEkskulList.map((e,i)=>(<tr key={i}><td className="text-center">{i+1}</td><td className="pl-2">{e.nama}</td><td className="text-center">{e.predikat}</td></tr>)) : <tr><td colSpan="3" className="text-center">-</td></tr>}</tbody></table></div><div className="w-[35%]"><h3 className="font-bold mb-0.5 text-[12px] underline">C. Ketidakhadiran</h3><table className="print-table w-full"><tbody><tr><td>Sakit</td><td className="text-center w-12">{myAbsen.sakit || '-'}</td><td>Hari</td></tr><tr><td>Izin</td><td className="text-center">{myAbsen.izin || '-'}</td><td>Hari</td></tr><tr><td>Tanpa Ket.</td><td className="text-center">{myAbsen.alpa || '-'}</td><td>Hari</td></tr></tbody></table></div></div>
                    <div className="flex justify-between mt-2 px-8 text-center text-[12px]"><div><p className="mb-10">Mengetahui,<br/>Orang Tua/Wali</p><p className="border-b border-black w-40 mx-auto"></p></div><div><p className="mb-10">{(logo || {}).kota}, {(logo || {}).tgl_rapor}<br/>Wali Kelas</p><p className="font-bold underline">{waliKelasName}</p><p>NIP. -</p></div></div>
                </div>
            );
        }

        const PrintRaporPondok = ({ data, siswa }) => {
            const { sekolah, mapel, nilaiMapel, absensi, logo } = data;
            const myAbsen = (absensi || []).find(a => String(a.siswa_id) === String(siswa.id)) || {sakit:0,izin:0,alpa:0};
            
            const waliKelasName = ((logo || {}).wali_kelas_per_kelas && (logo || {}).wali_kelas_per_kelas[siswa.kelas]) || (logo || {}).wali_kelas || "Wali Kelas";
            const waliKelasPegonName = ((logo || {}).wali_kelas_pegon_per_kelas && (logo || {}).wali_kelas_pegon_per_kelas[siswa.kelas]) || toPegon(stripGelar(waliKelasName));
            const kepsekPegonName = sekolah.kepalaSekolahPegon || toPegon(stripGelar(sekolah.kepalaSekolah));
            const siswaPegonName = siswa.nama_pegon || toPegon(siswa.nama);
            
            const kelasObj = (data.kelas || []).find(k => k.nama === siswa.kelas);
            const kelasPegonName = kelasObj?.nama_pegon || toArabicNum(siswa.kelas);

            const isPutra = (siswa.jenis_kelamin || '').toUpperCase() === 'L';
            const getProp = (m, prop) => m[`${prop}_per_kelas`] && m[`${prop}_per_kelas`][siswa.kelas] !== undefined ? m[`${prop}_per_kelas`][siswa.kelas] : m[prop];

            // Filter Mapel Pondok
            const pondokMapelsForAll = (mapel || []).filter(m => getProp(m, 'kelompok') === 'C' && m.aktif !== false);
            const pondokMapels = pondokMapelsForAll.filter(m => { 
                if(!m.kelas || !m.kelas.includes(siswa.kelas)) return false; 
                return true;
            }).sort((a,b) => getProp(a, 'urutan') - getProp(b, 'urutan'));

            let totalScore = 0;
            pondokMapels.forEach(m => {
                const val = (nilaiMapel || []).find(n => String(n.siswa_id) === String(siswa.id) && String(n.mapel_id) === String(m.id)) || {}; 
                totalScore += parseInt(val.sas) || 0;
            });
            const totalMapel = pondokMapels.length;
            const avgScore = totalMapel > 0 ? Math.round(totalScore / totalMapel) : 0;
            const predikatTotal = getPondokPredicate(avgScore);

            // Menghitung Rank (طباقة المهارة)
            const studentsInClass = (data.siswa || []).filter(s => s.kelas === siswa.kelas);
            const classScores = studentsInClass.map(s => {
                let tScore = 0;
                pondokMapels.forEach(mapelItem => {
                    const val = (nilaiMapel || []).find(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(mapelItem.id)) || {};
                    tScore += parseInt(val.sas) || 0;
                });
                return { id: s.id, score: tScore };
            });
            classScores.sort((a, b) => b.score - a.score);
            const rankIndex = classScores.findIndex(s => String(s.id) === String(siswa.id)) + 1;
            const rankArabic = rankIndex > 0 ? toArabicNum(rankIndex) : '-';
            const rankWord = rankIndex > 0 ? toArabicWord(rankIndex) : '-';

            // Logika Penentuan Semester Arab
            const semesterArab = (sekolah.semester || '').toLowerCase() === 'genap' ? 'الثاني' : 'الأول';

            // Memastikan jumlah baris minimal 10 seperti PDF
            const paddedMapels = [...pondokMapels];
            while (paddedMapels.length < 10) {
                paddedMapels.push({ id: `empty-${paddedMapels.length}`, isEmpty: true });
            }

            const midPoint = Math.ceil(paddedMapels.length / 2);

            const renderRow = (m, i) => {
                const isTopHalf = i === 0;
                const isBottomHalf = i === midPoint;

                if (m.isEmpty) {
                    return (
                        <tr key={m.id} className="h-10">
                            <td className="border-black"></td>
                            <td className="border-black"></td>
                            <td className="border-black"></td>
                            <td className="border-black"></td>
                            <td className="border-black"></td>
                            {isTopHalf && <td rowSpan={midPoint} className="align-top text-right p-3 relative bg-white border-black w-[15%]">
                                <span className="absolute top-2 right-2 text-[10pt]">والي الفصل :</span>
                                <span className="absolute bottom-4 left-0 right-0 text-center font-bold text-[13pt]">{waliKelasPegonName}</span>
                            </td>}
                            {isBottomHalf && <td rowSpan={paddedMapels.length - midPoint} className="align-top text-right p-3 relative bg-white border-black">
                                <span className="absolute top-2 right-2 text-[10pt]">الوالي :</span>
                                <div className="absolute bottom-5 left-2 right-2 border-b border-black"></div>
                            </td>}
                        </tr>
                    );
                }

                const val = (nilaiMapel || []).find(n => String(n.siswa_id) === String(siswa.id) && String(n.mapel_id) === String(m.id)) || {}; 
                const sas = parseInt(val.sas) || 0; 
                
                const rawKitab = isPutra ? m.kitab_putra : m.kitab_putri;
                const kitabName = rawKitab ? toPegon(rawKitab) : '-';
                const mapelName = mapelToArabic(m.nama);
                const scoreArabic = sas > 0 ? toArabicNum(sas) : '';
                const scoreWords = sas > 0 ? toArabicWord(sas) : '';

                return (
                    <tr key={m.id} className="h-10">
                        <td className="text-center font-bold text-[13pt] border-black">{toArabicNum(i + 1)}</td>
                        <td className="text-center font-bold text-[14pt] border-black">{kitabName}</td>
                        <td className="text-center text-[13pt] border-black">{mapelName}</td>
                        <td className="text-center font-bold text-lg border-black">{scoreArabic}</td>
                        <td className="text-center font-bold text-[11pt] border-black leading-tight">{scoreWords}</td>
                        {isTopHalf && <td rowSpan={midPoint} className="align-top text-right p-3 relative bg-white border-black w-[15%]">
                            <span className="absolute top-2 right-2 text-[10pt]">والي الفصل :</span>
                            <span className="absolute bottom-4 left-0 right-0 text-center font-bold text-[13pt]">{waliKelasPegonName}</span>
                        </td>}
                        {isBottomHalf && <td rowSpan={paddedMapels.length - midPoint} className="align-top text-right p-3 relative bg-white border-black">
                            <span className="absolute top-2 right-2 text-[10pt]">الوالي :</span>
                            <div className="absolute bottom-5 left-2 right-2 border-b border-black"></div>
                        </td>}
                    </tr>
                );
            };

            return (
                <div className="w-full h-full bg-white text-black p-2 page-break relative font-pegon text-[13pt]" dir="rtl">
                    <div className="text-center mb-6 pb-2">
                        <h1 className="text-[22pt] mb-2 font-bold text-black tracking-wide">كشف درجات الامتحان للفصل الدراسي {semesterArab}</h1>
                        <h2 className="text-[13pt] text-black font-sans font-semibold" dir="ltr">عام الدراسي {toArabicNum((sekolah.tahunPelajaran||'').replace(/\//g, '/'))} م / {sekolah.tahunHijriah || '١٤٤٦ - ١٤٤٧ هـ'}</h2>
                    </div>

                    <div className="flex justify-between mb-4 text-[13pt]">
                        <table className="w-[60%]">
                            <tbody>
                                <tr>
                                    <td className="w-40 font-bold pb-2">رقم القيد</td>
                                    <td className="w-6 pb-2">:</td>
                                    <td className="pb-2 font-bold font-sans text-[14pt]" dir="ltr" style={{textAlign: 'right'}}>{toArabicNum(siswa.nisn)}</td>
                                </tr>
                                <tr>
                                    <td className="font-bold pb-2">اسم الطالب / الطالبة</td>
                                    <td className="pb-2">:</td>
                                    <td className="font-bold pb-2 text-[16pt]">{siswaPegonName}</td>
                                </tr>
                                <tr>
                                    <td className="font-bold">المستوى</td>
                                    <td>:</td>
                                    <td className="font-bold text-[14pt] text-right">{kelasPegonName}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <table className="print-table-pondok border-2 border-black w-full">
                        <thead className="bg-slate-50">
                            <tr>
                                <th className="w-[5%] border-black text-[12pt]">الرقم</th>
                                <th className="w-[28%] border-black text-[12pt]">الكتب الدراسية</th>
                                <th className="w-[17%] border-black text-[12pt]">الفنون</th>
                                <th className="w-[8%] border-black text-[12pt]">رقما</th>
                                <th className="w-[27%] border-black text-[12pt]">كتابة</th>
                                <th className="w-[15%] border-black text-[12pt]">الملاحظة</th>
                            </tr>
                        </thead>
                        <tbody>
                            {/* Baris 1-10: Mapel Pondok & TTD Walas/Ortu */}
                            {paddedMapels.map((m, i) => renderRow(m, i))}
                            
                            {/* Baris 11: Total */}
                            <tr className="bg-white h-10">
                                <td colSpan="3" className="text-center font-bold text-[13pt] border-black bg-slate-50">المجموع</td>
                                <td className="text-lg font-bold border-black">{toArabicNum(totalScore)}</td>
                                <td className="text-[10pt] font-bold border-black leading-tight">{toArabicWord(totalScore)}</td>
                                
                                {/* Area Kiri untuk Tanda Tangan Kepala Sekolah yang menyatu (rowspan=6) */}
                                <td rowSpan="6" className="align-top border-black p-3 relative bg-white">
                                    <div className="text-center text-[10pt] mt-1">{logo.kotaPegon ? toPegon(logo.kotaPegon) : 'مجاكرطا'}، {toArabicNum((logo.tgl_rapor||'').replace(/[a-zA-Z]/g, '').trim())}</div>
                                    <div className="text-center text-[11pt] font-bold mt-2">مدير المدرسة :</div>
                                    <div className="text-center font-bold text-[14pt] mt-14">{kepsekPegonName}</div>
                                    
                                    <div className="absolute bottom-2 left-0 right-0">
                                        <div className="text-center text-[11pt] font-bold">التقدير :</div>
                                        <div className="text-center font-bold mt-1 text-[20pt] leading-none mb-2">{predikatTotal}</div>
                                    </div>
                                </td>
                            </tr>
                            
                            {/* Baris 12: Rata-Rata */}
                            <tr className="bg-white h-10">
                                <td colSpan="3" className="text-center font-bold text-[13pt] border-black bg-slate-50">النتيجة الوسيطة</td>
                                <td className="text-lg font-bold border-black">{toArabicNum(avgScore)}</td>
                                <td className="text-[11pt] font-bold border-black">{toArabicWord(avgScore)}</td>
                            </tr>
                            
                            {/* Baris 13: Thabaqah Al-Maharah */}
                            <tr className="bg-white h-10">
                                <td colSpan="3" className="text-center font-bold text-[13pt] border-black bg-slate-50">طباقة المهارة</td>
                                <td className="text-lg font-bold border-black">{rankArabic}</td>
                                <td className="text-[11pt] font-bold border-black">{rankWord}</td>
                            </tr>
                            
                            {/* Baris 14: Absensi Sakit */}
                            <tr className="bg-white h-10">
                                <td rowSpan="3" className="border-black font-bold bg-slate-50 text-[12pt] align-middle vertical-text">عدم الدخول</td>
                                <td colSpan="2" className="border-black font-bold text-center bg-slate-50 text-[12pt]">المرض</td>
                                <td className="border-black font-bold text-lg text-center">{toArabicNum(myAbsen.sakit || '-')}</td>
                                <td className="border-black font-bold text-center text-[11pt]">أيام</td>
                            </tr>
                            
                            {/* Baris 15: Absensi Izin */}
                            <tr className="bg-white h-10">
                                <td colSpan="2" className="border-black font-bold text-center bg-slate-50 text-[12pt]">بعذر</td>
                                <td className="border-black font-bold text-lg text-center">{toArabicNum(myAbsen.izin || '-')}</td>
                                <td className="border-black font-bold text-center text-[11pt]">أيام</td>
                            </tr>
                            
                            {/* Baris 16: Absensi Alpa */}
                            <tr className="bg-white h-10">
                                <td colSpan="2" className="border-black font-bold text-center bg-slate-50 text-[12pt]">بغير عذر</td>
                                <td className="border-black font-bold text-lg text-center">{toArabicNum(myAbsen.alpa || '-')}</td>
                                <td className="border-black font-bold text-center text-[11pt]">أيام</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---
        function App() {
            const [activeSemester, setActiveSemester] = useStickyState({ tahun: '2025/2026', semester: 'Ganjil' }, 'erapor_active_sem_v6');
            const [pendingLogin, setPendingLogin] = useState(null);
            const [loginError, setLoginError] = useState('');
            
            const { data: fbData, updateData, loading, authUser } = useFirebaseData(activeSemester);
            const [data, setData] = useStickyState(SEED_DATA, 'erapor_data_v6');
            const [user, setUser] = useStickyState(null, 'erapor_user_v6');
            const [page, setPage] = useState('dashboard');
            const [sidebarOpen, setSidebarOpen] = useState(true);
            const [notification, setNotification] = useState(null);
            const [printQueue, setPrintQueue] = useState([]);
            const [printType, setPrintType] = useState('akademik');
            const [modal, setModal] = useState({ show: false, type: '', data: null });
            const [formData, setFormData] = useState({});

            useEffect(() => { if (fbData && !fbData._isEmpty) setData(fbData); }, [fbData, setData]);

            useEffect(() => {
                if (pendingLogin && fbData && !loading) {
                    if (fbData._isEmpty) {
                        if (pendingLogin.username === 'admin' && pendingLogin.password === '123') {
                            if (confirm(`Database untuk ${pendingLogin.tahun} - ${pendingLogin.semester} masih kosong.\n\nSebagai Admin, apakah Anda ingin menginisialisasi database ini dengan data bawaan (SEED DATA)?`)) {
                                const initData = { ...SEED_DATA, sekolah: { ...SEED_DATA.sekolah, tahunPelajaran: pendingLogin.tahun, semester: pendingLogin.semester } };
                                updateData(initData).then(() => {
                                    setPendingLogin(null);
                                    setUser(initData.users.find(u => u.username === 'admin'));
                                    notify(`Berhasil masuk ke ${pendingLogin.tahun} - ${pendingLogin.semester}`);
                                    setLoginError('');
                                });
                                return;
                            } else setLoginError('Inisialisasi dibatalkan oleh Admin.');
                        } else setLoginError('Semester ini belum dibuat/kosong. Hubungi Admin!');
                        setPendingLogin(null);
                        return;
                    }
                    const found = (fbData.users || []).find(u => u.username === pendingLogin.username && u.password === pendingLogin.password);
                    if (found) { setUser(found); notify(`Berhasil masuk`); setLoginError(''); } 
                    else { setLoginError('Username atau Password salah!'); }
                    setPendingLogin(null);
                }
            }, [fbData, pendingLogin, loading]);

            const { isWalas, isKepsek, isWakaAkademik, isPanitiaSumatif } = useMemo(() => {
                let w = false, k = false, a = false, p = false;
                if (!user || user.role !== 'guru' || !data || data._isEmpty) return { isWalas: w, isKepsek: k, isWakaAkademik: a, isPanitiaSumatif: p };
                let primaryMatch = null;
                if (user.id && String(user.id).startsWith('usr-g-')) { primaryMatch = (data.guru || []).find(g => String(g.id) === String(user.id.replace('usr-g-', ''))); }
                if (!primaryMatch && user.nip && String(user.nip).trim() !== '' && String(user.nip).trim() !== '-') { primaryMatch = (data.guru || []).find(g => String(g.nip).trim() === String(user.nip).trim()); }
                if (!primaryMatch && user.nama) { primaryMatch = (data.guru || []).find(g => g.nama && String(g.nama).trim().toLowerCase() === String(user.nama).trim().toLowerCase()); }

                if (primaryMatch) {
                    const profiles = (data.guru || []).filter(g => {
                        const hasValidNip = primaryMatch.nip && String(primaryMatch.nip).trim() !== '-' && String(primaryMatch.nip).trim() !== '';
                        const sameNip = hasValidNip && g.nip && String(g.nip).trim() === String(primaryMatch.nip).trim();
                        const hasValidName = primaryMatch.nama && String(primaryMatch.nama).trim() !== '';
                        const sameName = hasValidName && g.nama && String(g.nama).trim().toLowerCase() === String(primaryMatch.nama).trim().toLowerCase();
                        return sameNip || sameName;
                    });
                    profiles.forEach(g => {
                        if (g.tugasTambahan) {
                            const taskList = Array.isArray(g.tugasTambahan) ? g.tugasTambahan : g.tugasTambahan.split(',');
                            taskList.forEach(t => {
                                const task = t.trim().toLowerCase();
                                if (task.includes('wali kelas')) w = true;
                                if (task === 'kepala sekolah') k = true;
                                if (task === 'waka akademik') a = true;
                                if (task === 'panitia sumatif') p = true;
                            });
                        }
                    });
                }
                return { isWalas: w, isKepsek: k, isWakaAkademik: a, isPanitiaSumatif: p };
            }, [user, data]);

            const notify = (message, type='success') => setNotification({message, type});
            const handleLogout = (force = false) => { if(force === true || confirm('Yakin ingin keluar?')) { setUser(null); setPage('dashboard'); } };
            const handlePrint = (studentList, t = 'akademik') => { 
                if (studentList.length === 0) return notify('Tidak ada siswa di kelas ini', 'error'); 
                setPrintType(t); 
                setPrintQueue(studentList); 
                setTimeout(() => window.print(), 500); 
            };
            const handleMenuClick = (targetPage) => { setPage(targetPage); if (window.innerWidth < 1024) setSidebarOpen(false); };
            const handleLoginSubmit = (form) => { setLoginError(''); setPendingLogin(form); };

            const processImport = (event, type) => {
                const file = event.target.files[0]; if (!file) return;
                const reader = new FileReader(); reader.onload = (e) => {
                    const fileData = new Uint8Array(e.target.result); const workbook = XLSX.read(fileData, { type: 'array' }); const sheet = workbook.Sheets[workbook.SheetNames[0]]; const json = XLSX.utils.sheet_to_json(sheet);
                    updateData(prev => {
                        if (type === 'siswa') { 
                            const newSiswa = json.map(row => ({ 
                                id: Date.now() + Math.random(), 
                                nisn: String(row['NOMOR INDUK'] || row['Nomor Induk'] || row['nomor induk'] || row['NISN'] || row['nisn'] || ''), 
                                nama: String(row['NAMA'] || row['nama'] || row['NAMA LENGKAP'] || ''), 
                                kelas: String(row['KELAS'] || row['kelas'] || ''), 
                                fase: String(row['FASE'] || row['fase'] || 'E'), 
                                no_absen: row['NO_ABSEN'] || row['no_absen'] || 0,
                                jenis_kelamin: String(row['JENIS_KELAMIN'] || row['jenis kelamin'] || row['JK'] || row['jk'] || '').toUpperCase().startsWith('L') ? 'L' : 'P'
                            })).filter(s => s.nama); 
                            notify(`Berhasil import ${newSiswa.length} siswa!`, 'success'); 
                            return { ...prev, siswa: [...(prev.siswa || []), ...newSiswa] }; 
                        } 
                        else if (type === 'guru') { 
                            const newGuru = json.map(row => {
                                const tugasStr = String(row['TUGAS_TAMBAHAN'] || row['tugas_tambahan'] || '');
                                const tugasArray = tugasStr.split(',').map(s=>s.trim()).filter(s=>s!=='' && s!=='-');
                                return { id: Date.now() + Math.random(), nip: String(row['NIP'] || row['nip'] || ''), nama: String(row['NAMA'] || row['nama'] || ''), mapel: String(row['MAPEL'] || row['mapel'] || ''), tugasTambahan: tugasArray };
                            }).filter(g => g.nama); 
                            notify(`Berhasil import ${newGuru.length} guru!`, 'success'); 
                            return { ...prev, guru: [...(prev.guru || []), ...newGuru] }; 
                        }
                        return prev;
                    });
                }; reader.readAsArrayBuffer(file); event.target.value = null;
            };

            const downloadTemplate = (type) => { 
                const wb = XLSX.utils.book_new(); 
                let headers = []; 
                if(type === 'siswa') headers = [['NOMOR INDUK', 'NAMA', 'JENIS KELAMIN', 'KELAS', 'FASE', 'NO_ABSEN']]; 
                if(type === 'guru') headers = [['NIP', 'NAMA', 'MAPEL', 'TUGAS_TAMBAHAN']]; 
                const ws = XLSX.utils.aoa_to_sheet(headers); XLSX.utils.book_append_sheet(wb, ws, "Template"); XLSX.writeFile(wb, `template_import_${type}.xlsx`); 
            };

            const BackupRestore = ({ data, setData, notify }) => {
                const fileInputRef = useRef(null);
                const handleBackup = () => { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data)); const downloadAnchorNode = document.createElement('a'); const timestamp = new Date().toISOString().slice(0,10); downloadAnchorNode.setAttribute("href", dataStr); downloadAnchorNode.setAttribute("download", `backup_erapor_${timestamp}.json`); document.body.appendChild(downloadAnchorNode); downloadAnchorNode.click(); downloadAnchorNode.remove(); notify("Backup data berhasil diunduh!", "success"); };
                const handleRestore = (event) => { 
                    const file = event.target.files[0]; if (!file) return; 
                    const reader = new FileReader(); 
                    reader.onload = (e) => { 
                        try { 
                            const json = JSON.parse(e.target.result); 
                            if (json.sekolah && json.users && json.siswa) { 
                                if(confirm("Apakah Anda yakin ingin memulihkan data? Data saat ini akan ditimpa!")) { 
                                    const safeData = {
                                        ...SEED_DATA, ...json,
                                        sekolah: json.sekolah || SEED_DATA.sekolah, users: json.users || [], siswa: json.siswa || [], guru: json.guru || [],
                                        kelas: json.kelas || [], mapel: json.mapel || [], ekskulRef: json.ekskulRef || [], nilaiMapel: json.nilaiMapel || [],
                                        nilaiEkskul: json.nilaiEkskul || [], absensi: json.absensi || [], logo: json.logo || SEED_DATA.logo
                                    };
                                    setData(safeData); notify("Data berhasil dipulihkan!", "success"); 
                                } 
                            } else { notify("Format file backup tidak valid.", "error"); } 
                        } catch (err) { notify("Gagal membaca file backup.", "error"); } 
                    }; reader.readAsText(file); event.target.value = null; 
                };
                return (<div className="space-y-6 animate-fade"><h2 className="text-2xl font-bold text-slate-800">Backup & Restore Data</h2><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="bg-white p-6 rounded-xl border shadow-sm flex flex-col justify-between"><div><div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-lg flex items-center justify-center mb-4"><Icon name="download-cloud" size={24}/></div><h3 className="font-bold text-lg mb-2">Backup Data</h3><p className="text-slate-500 text-sm mb-6">Unduh seluruh data aplikasi untuk disimpan sebagai cadangan.</p></div><button onClick={handleBackup} className="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition flex items-center justify-center gap-2"><Icon name="download" size={18}/> Download Backup</button></div><div className="bg-white p-6 rounded-xl border shadow-sm flex flex-col justify-between"><div><div className="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-lg flex items-center justify-center mb-4"><Icon name="upload-cloud" size={24}/></div><h3 className="font-bold text-lg mb-2">Restore Data</h3><p className="text-slate-500 text-sm mb-6">Pulihkan data aplikasi dari file backup JSON. <span className="text-red-500 font-bold">Data saat ini akan ditimpa!</span></p></div><input type="file" ref={fileInputRef} accept=".json" className="hidden" onChange={handleRestore} /><button onClick={() => fileInputRef.current.click()} className="w-full bg-emerald-600 text-white py-2 rounded-lg font-medium hover:bg-emerald-700 transition flex items-center justify-center gap-2"><Icon name="refresh-ccw" size={18}/> Restore Data</button></div></div></div>);
            };

            const openModal = (type, item=null) => { setModal({ show:true, type, data:item }); setFormData(item || {}); }
            
            const saveData = () => {
                const type = modal.type; 
                updateData(prevData => {
                    let updatedList = [...(type === 'ekskul' ? (prevData.ekskulRef||[]) : (prevData[type]||[]))]; let newUsers = [...(prevData.users||[])];
                    if (modal.data) { 
                        const idx = updatedList.findIndex(x => String(x.id) === String(modal.data.id)); updatedList[idx] = { ...updatedList[idx], ...formData };
                        if (type === 'guru') { const updatedGuru = updatedList[idx]; newUsers = newUsers.map(u => { const isLinked = String(u.id) === `usr-g-${modal.data.id}` || (u.nama === modal.data.nama && u.role === 'guru'); if (isLinked) { return { ...u, nama: updatedGuru.nama, nip: updatedGuru.nip }; } return u; }); }
                    } else { updatedList.push({ id: Date.now(), ...formData }); }
                    const newState = { ...prevData };
                    if(type === 'ekskul') newState.ekskulRef = updatedList; else newState[type] = updatedList;
                    if (type === 'guru') newState.users = newUsers;
                    return newState;
                });
                setModal({ show:false, type:'', data:null }); notify('Data berhasil disimpan');
            };

            const deleteItem = (key, id) => { if(confirm('Hapus data ini?')) { updateData(prev => { const newState = { ...prev }; if(key === 'ekskulRef') newState.ekskulRef = (prev.ekskulRef||[]).filter(i => String(i.id) !== String(id)); else newState[key] = (prev[key]||[]).filter(i => String(i.id) !== String(id)); return newState; }); notify('Data berhasil dihapus'); } };
            
            const renderContent = () => {
                if (!data) return <div className="p-10 text-center">Memuat Data...</div>;
                if (data._isEmpty) {
                    setTimeout(() => handleLogout(true), 0);
                    return <div className="p-10 text-center text-red-500 font-bold">Database Kosong / Terhapus. Harap Login ulang.</div>;
                }

                switch(page) {
                    case 'dashboard': return <Dashboard data={data} />;
                    case 'data_sekolah': return <DataSekolah data={data} setData={updateData} notify={notify} />;
                    case 'data_logo': return <LogoSetting data={data} setData={updateData} notify={notify} />;
                    case 'data_akun': return <DataAkun data={data} setData={updateData} notify={notify} />;
                    case 'data_pegon': return <DataPegonPondok data={data} setData={updateData} notify={notify} />;
                    case 'siswa': return <TableView title="Data Siswa" heads={['Nomor Induk','Nama','JK','Kelas','Fase']} data={data.siswa} searchKeys={['nama','nisn']} filterOptions={data.kelas} filterKey="kelas" renderRow={i=><><td className="p-4">{i.nisn}</td><td className="p-4 font-bold">{i.nama}</td><td className="p-4 text-center">{i.jenis_kelamin || '-'}</td><td className="p-4">{i.kelas}</td><td className="p-4">{i.fase}</td></>} onAdd={()=>openModal('siswa')} onEdit={d=>openModal('siswa',d)} onDelete={id=>deleteItem('siswa', id)} onImport={(e) => processImport(e, 'siswa')} onDownloadTemplate={() => downloadTemplate('siswa')} />;
                    case 'guru': return <TableView title="Data Guru" heads={['NIP','Nama','Mapel','Tugas','Kelas Mengajar']} data={data.guru} searchKeys={['nama','nip']} renderRow={i=><><td className="p-4">{i.nip}</td><td className="p-4 font-bold">{i.nama}</td><td className="p-4">{i.mapel}</td><td className="p-4 text-sm">{Array.isArray(i.tugasTambahan) ? (i.tugasTambahan.length > 0 ? i.tugasTambahan.join(', ') : '-') : (i.tugasTambahan || '-')}</td><td className="p-4 text-xs italic">{(i.kelasMengajar||[]).join(', ') || '-'}</td></>} onAdd={()=>openModal('guru')} onEdit={d=>openModal('guru',d)} onDelete={id=>deleteItem('guru', id)} onImport={(e) => processImport(e, 'guru')} onDownloadTemplate={() => downloadTemplate('guru')} />;
                    case 'mapel': return <TableView title="Data Mapel" heads={['Nama','Kel','Kitab Putra','Kitab Putri','Kelas']} data={data.mapel} searchKeys={['nama']} filterOptions={data.kelas} filterKey="kelas" renderRow={i=><><td className="p-4 font-medium">{i.nama}</td><td className="p-4 text-center">{i.kelompok}</td><td className="p-4 font-pegon text-lg text-center" dir="rtl">{i.kitab_putra||'-'}</td><td className="p-4 font-pegon text-lg text-center" dir="rtl">{i.kitab_putri||'-'}</td><td className="p-4 text-xs italic">{(i.kelas||[]).join(', ') || 'Semua'}</td></>} onAdd={()=>openModal('mapel')} onEdit={d=>openModal('mapel',d)} onDelete={id=>deleteItem('mapel', id)} />;
                    case 'kelas': return <TableView title="Data Kelas" heads={['Nama','Tingkat','Jurusan']} data={data.kelas} searchKeys={['nama']} renderRow={i=><><td className="p-4 font-bold">{i.nama}</td><td className="p-4">{i.tingkat}</td><td className="p-4">{i.jurusan}</td></>} onAdd={()=>openModal('kelas')} onEdit={d=>openModal('kelas',d)} onDelete={id=>deleteItem('kelas', id)} />;
                    case 'referensi_ekskul': return <TableView title="Data Ekstrakurikuler" heads={['Nama Kegiatan']} data={data.ekskulRef} searchKeys={['nama']} renderRow={i=><td className="p-4 font-medium">{i.nama}</td>} onAdd={()=>openModal('ekskul')} onEdit={d=>openModal('ekskul',d)} onDelete={id=>deleteItem('ekskulRef', id)} />;
                    case 'mapping': return <MappingRapor dataMapel={data.mapel} classList={data.kelas} setData={updateData} notify={notify} />;
                    case 'input_nilai': return user.role !== 'siswa' ? <InputNilai data={data} setData={updateData} updateData={updateData} notify={notify} user={user} /> : <div className="p-10 text-center">Akses Ditolak</div>;
                    case 'input_absensi': return (user.role === 'admin' || isWalas) ? <InputAbsensi data={data} setData={updateData} notify={notify} user={user} /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Wali Kelas</div>;
                    case 'input_ekskul': return (user.role === 'admin' || isWalas) ? <InputEkskul data={data} setData={updateData} notify={notify} user={user} /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Wali Kelas</div>;
                    case 'cetak_leger': return <CetakLeger data={data} notify={notify} user={user} />;
                    case 'perangkingan': return (user.role === 'admin' || isWalas) ? <Perangkingan data={data} notify={notify} user={user} /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Wali Kelas/Admin</div>;
                    case 'cetak': return (user.role === 'admin' || isWalas) ? <CetakRaporSelector data={data} handlePrint={handlePrint} user={user} type="akademik" /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Wali Kelas</div>;
                    case 'cetak_pondok': return (user.role === 'admin' || isWalas) ? <CetakRaporSelector data={data} handlePrint={handlePrint} user={user} type="pondok" /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Wali Kelas</div>;
                    case 'monitoring': return (user?.role === 'admin' || isKepsek || isWakaAkademik || isPanitiaSumatif) ? <MonitoringNilai data={data} /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Pimpinan/Admin/Panitia</div>;
                    case 'manajemen_semester': return user?.role === 'admin' ? <ManajemenSemester data={data} activeSemester={activeSemester} notify={notify} /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Admin</div>;
                    case 'backup_restore': return user?.role === 'admin' ? <BackupRestore data={data} setData={updateData} notify={notify} /> : <div className="p-10 text-center text-red-500 font-bold">Akses Ditolak: Khusus Admin</div>;
                    default: return <div>Halaman tidak ditemukan</div>;
                }
            };

            if (pendingLogin || (loading && !fbData && !user)) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-4 border-b-4 border-secondary"></div>
                    <div className="text-slate-500 font-medium text-sm animate-pulse">{pendingLogin ? 'Memvalidasi Akses...' : 'Membuka Database Server...'}</div>
                </div>
            );

            if (!user) return <LoginPage onLogin={handleLoginSubmit} logo={data?.logo} externalError={loginError} activeSemester={activeSemester} onSemesterChange={setActiveSemester} isFetching={loading} />;

            return (
                <div className="flex h-screen overflow-hidden bg-slate-50">
                    {notification && <Toast message={notification.message} type={notification.type} onClose={()=>setNotification(null)} />}
                    <Modal isOpen={modal.show} onClose={()=>setModal({...modal,show:false})} title={modal.data ? 'Edit Data' : 'Tambah Data'}>
                        <div className="space-y-2">
                             {modal.type === 'siswa' && <><FormInput label="Nomor Induk" value={formData.nisn} onChange={v=>setFormData({...formData,nisn:v})}/><FormInput label="Nama" value={formData.nama} onChange={v=>setFormData({...formData,nama:v})}/>
                                <div className="mb-4"><label className="block text-sm font-medium text-slate-700 mb-1">Jenis Kelamin</label><select className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm" value={formData.jenis_kelamin || ''} onChange={e=>setFormData({...formData,jenis_kelamin:e.target.value})}><option value="">Pilih</option><option value="L">Laki-Laki (L)</option><option value="P">Perempuan (P)</option></select></div>
                             <FormInput label="Kelas" value={formData.kelas} onChange={v=>setFormData({...formData,kelas:v})}/></>}
                             
                             {modal.type === 'guru' && (
                                <>
                                    <FormInput label="NIP" value={formData.nip} onChange={v=>setFormData({...formData,nip:v})}/>
                                    <FormInput label="Nama" value={formData.nama} onChange={v=>setFormData({...formData,nama:v})}/>
                                    <div className="mb-4">
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Mata Pelajaran</label>
                                        <select className="w-full px-3 py-2 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm" value={formData.mapel || ''} onChange={e => setFormData({...formData, mapel: e.target.value})}>
                                            <option value="">-- Pilih Mata Pelajaran --</option>
                                            {(data.mapel||[]).sort((a,b) => a.nama.localeCompare(b.nama)).map(m => (<option key={m.id} value={m.nama}>{m.nama}</option>))}
                                        </select>
                                    </div>
                                    <TugasTambahanSelector availableClasses={data.kelas||[]} selectedTugas={formData.tugasTambahan} onChange={v=>setFormData({...formData,tugasTambahan:v})}/>
                                    <ClassSelector label="Kelas Mengajar" availableClasses={data.kelas||[]} selectedClasses={formData.kelasMengajar} onChange={v=>setFormData({...formData,kelasMengajar:v})}/>
                                </>
                             )}
                             
                             {modal.type === 'mapel' && <><FormInput label="Nama" value={formData.nama} onChange={v=>setFormData({...formData,nama:v})}/><FormInput label="Kelompok" value={formData.kelompok} onChange={v=>setFormData({...formData,kelompok:v})}/>
                                <div className="grid grid-cols-2 gap-4"><FormInput label="Kitab Putra (Pegon/Latin)" value={formData.kitab_putra} onChange={v=>setFormData({...formData,kitab_putra:v})}/><FormInput label="Kitab Putri (Pegon/Latin)" value={formData.kitab_putri} onChange={v=>setFormData({...formData,kitab_putri:v})}/></div>
                             <ClassSelector label="Diajarkan di Kelas" availableClasses={data.kelas||[]} selectedClasses={formData.kelas} onChange={v=>setFormData({...formData,kelas:v})}/></>}
                             {modal.type === 'kelas' && <><FormInput label="Nama" value={formData.nama} onChange={v=>setFormData({...formData,nama:v})}/><FormInput label="Jurusan" value={formData.jurusan} onChange={v=>setFormData({...formData,jurusan:v})}/></>}
                             {modal.type === 'ekskul' && <FormInput label="Nama Kegiatan" value={formData.nama} onChange={v=>setFormData({...formData,nama:v})}/>}
                             <button onClick={saveData} className="w-full bg-secondary text-white py-2 rounded font-bold mt-4">Simpan</button>
                        </div>
                    </Modal>
                    
                    <div className="print-only fixed inset-0 bg-white z-[9999]">
                        {printQueue.map(s => printType === 'pondok' ? <PrintRaporPondok key={s.id} data={data} siswa={s} /> : <PrintRapor key={s.id} data={data} siswa={s} />)}
                    </div>
                    
                    <aside className={`bg-primary text-slate-300 w-64 flex flex-col shadow-2xl transition-all duration-300 no-print ${sidebarOpen ? 'translate-x-0' : '-translate-x-64 absolute h-full z-40'}`}>
                        <div className="h-16 flex items-center px-6 font-bold text-xl tracking-tight text-white border-b border-slate-700">{(data.logo||{}).image ? (<img src={data.logo.image} className="h-8 w-auto mr-2 object-contain" alt="Logo" onError={(e) => e.target.style.display = 'none'} />) : (<span className="text-secondary mr-1">e</span>)} Rapor<span className="font-light opacity-50 ml-1">Pro</span></div>
                        <div className="flex-1 overflow-y-auto py-6 space-y-1">
                            <div className="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mb-2">Main</div>
                            <button onClick={()=>handleMenuClick('dashboard')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='dashboard' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="grid"/> Dashboard</button>
                            {user?.role === 'admin' && (
                                <>
                                    <div className="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mt-6 mb-2">Master Data</div>
                                    <button onClick={()=>handleMenuClick('data_sekolah')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='data_sekolah' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="school"/> Sekolah</button>
                                    <button onClick={()=>handleMenuClick('data_akun')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='data_akun' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="key"/> Data Akun</button>
                                    <button onClick={()=>handleMenuClick('siswa')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='siswa' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="users"/> Data Siswa</button>
                                    <button onClick={()=>handleMenuClick('guru')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='guru' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="briefcase"/> Data Guru</button>
                                    <button onClick={()=>handleMenuClick('kelas')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='kelas' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="layers"/> Data Kelas</button>
                                    <button onClick={()=>handleMenuClick('mapel')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='mapel' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="book"/> Data Mapel</button>
                                    <button onClick={()=>handleMenuClick('referensi_ekskul')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='referensi_ekskul' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="activity"/> Data Ekskul</button>
                                    <button onClick={()=>handleMenuClick('mapping')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='mapping' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="sliders"/> Mapping Rapor</button>
                                    <button onClick={()=>handleMenuClick('data_logo')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='data_logo' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="pen-tool"/> Logo & TTD</button>
                                    <button onClick={()=>handleMenuClick('data_pegon')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='data_pegon' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="type"/> Data Pegon Pondok</button>
                                    
                                    <div className="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mt-6 mb-2">Sistem</div>
                                    <button onClick={()=>handleMenuClick('manajemen_semester')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='manajemen_semester' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="folder-open"/> Manajemen Semester</button>
                                </>
                            )}
                            {(user?.role === 'admin' || user?.role === 'guru') && (
                                <>
                                    <div className="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mt-6 mb-2">Akademik & Rapor</div>
                                    <button onClick={()=>handleMenuClick('input_nilai')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='input_nilai' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="pen-tool"/> Input Nilai</button>
                                    <button onClick={()=>handleMenuClick('cetak_leger')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='cetak_leger' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="file-text"/> Cetak Leger</button>
                                    {(user?.role === 'admin' || isWalas) && (
                                        <>
                                            <button onClick={()=>handleMenuClick('input_absensi')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='input_absensi' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="calendar"/> Input Absensi</button>
                                            <button onClick={()=>handleMenuClick('input_ekskul')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='input_ekskul' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="award"/> Input Nilai Ekskul</button>
                                            
                                            <div className="mt-4 mb-2 mx-6 border-t border-slate-700"></div>
                                            
                                            <button onClick={()=>handleMenuClick('perangkingan')} className={`w-full px-6 py-3 text-left hover:bg-amber-900 hover:text-amber-400 transition flex items-center gap-3 ${page==='perangkingan' && 'bg-amber-950 text-amber-400 border-r-4 border-amber-500'}`}><Icon name="award"/> Perangkingan</button>
                                            <button onClick={()=>handleMenuClick('cetak')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='cetak' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="printer"/> Cetak Rapor Sisipan</button>
                                            <button onClick={()=>handleMenuClick('cetak_pondok')} className={`w-full px-6 py-3 text-left hover:bg-emerald-800 hover:text-emerald-400 transition flex items-center gap-3 ${page==='cetak_pondok' && 'bg-emerald-900 text-emerald-400 border-r-4 border-emerald-500'}`}><Icon name="book-open"/> Cetak Rapor Pondok</button>
                                        </>
                                    )}
                                </>
                            )}
                            {(user?.role === 'admin' || isKepsek || isWakaAkademik || isPanitiaSumatif) && (
                                <>
                                    <div className="px-6 text-xs font-bold text-slate-500 uppercase tracking-widest mt-6 mb-2">Monitoring</div>
                                    <button onClick={()=>handleMenuClick('monitoring')} className={`w-full px-6 py-3 text-left hover:bg-slate-800 hover:text-white transition flex items-center gap-3 ${page==='monitoring' && 'bg-slate-800 text-white border-r-4 border-secondary'}`}><Icon name="bar-chart-2"/> Monitoring Nilai</button>
                                </>
                            )}
                        </div>
                         <div className="p-4 border-t border-slate-700">
                            {user?.role === 'admin' && (
                                <button onClick={() => handleMenuClick('backup_restore')} className="w-full mb-3 text-slate-400 hover:text-white text-sm flex items-center gap-3 px-2 py-1 rounded hover:bg-slate-700 transition"><Icon name="database" size={16}/> Backup & Restore</button>
                            )}
                            <div className="flex items-center gap-3 mb-4"><div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-white font-bold">{user?.nama?.charAt(0) || 'U'}</div><div className="overflow-hidden"><p className="text-sm font-bold text-white truncate">{user?.nama || 'User'}</p><p className="text-xs text-slate-500 capitalize">{user?.role || ''}{isWalas ? ' (Walas)' : ''}</p></div></div>
                            <button onClick={() => handleLogout()} className="w-full bg-red-600/20 text-red-400 py-2 rounded text-sm hover:bg-red-600 hover:text-white transition flex items-center justify-center gap-2"><Icon name="log-out" size={16}/> Keluar</button>
                        </div>
                    </aside>
                    <main className={`flex-1 flex flex-col h-full transition-all duration-300 no-print`}>
                        <header className="h-16 bg-white border-b flex items-center justify-between px-6 shadow-sm z-30">
                            <button onClick={()=>setSidebarOpen(!sidebarOpen)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-600 transition"><Icon name="menu"/></button>
                            <div className="flex items-center gap-4">
                                <span className="text-sm text-slate-500 hidden md:block">
                                    {(data?.sekolah || {}).nama || 'Loading...'} 
                                    <span className="ml-3 px-2.5 py-1 bg-blue-50 border border-blue-100 rounded-md text-xs font-bold text-blue-700">
                                        {activeSemester?.semester} {activeSemester?.tahun}
                                    </span>
                                </span>
                                <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 border"><Icon name="bell" size={16}/></div>
                            </div>
                        </header>
                        <div className="flex-1 overflow-y-auto p-6 md:p-8"><div className="max-w-6xl mx-auto">{renderContent()}</div></div>
                    </main>
                </div>
            );
        }

        const startApp = () => {
            // Tunggu hingga library React ada dan Firebase siap dari script module
            if (window.firebaseReady && window.React && window.ReactDOM) {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(<App />);
            } else {
                setTimeout(startApp, 50);
            }
        };

        startApp();
    </script>
</body>
</html>
