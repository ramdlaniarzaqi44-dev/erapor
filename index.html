        const toPegon = (text) => {
            if (!text) return '';
            if (/[\u0600-\u06FF]/.test(text)) return text; 

            const dict = {
                'ng':'ڠ', 'ny':'ۑ', 'sy':'ش', 'kh':'خ', 'sh':'ص', 'th':'ط', 'dh':'ض', 'dz':'ذ', 'gh':'غ', 'ch':'ح',
                'c':'چ', 'p':'ڤ', 'g':'گ', 'v':'ۏ', 'q':'ق', 'x':'كس', 'z':'ز',
                'b':'ب', 'd':'د', 'f':'ف', 'h':'ه', 'j':'ج', 'k':'ك', 'l':'ل', 'm':'م', 'n':'ن', 'r':'ر', 's':'س', 't':'ت', 'w':'و', 'y':'ي',
                'a':'ا', 'i':'ي', 'u':'و', 'e':'ي', 'o':'و'
            };
            let res = text.toLowerCase();
            for (let [lat, peg] of Object.entries(dict)) {
                res = res.split(lat).join(peg);
            }
            return res;
        };

        const toArabicNum = (num) => String(num).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);

        const toArabicWord = (num) => {
            const n = parseInt(num);
            if (isNaN(n) || n === 0) return '-';
            
            const satuan = ['', 'وَاحِدٌ', 'اِثْنَانِ', 'ثَلَاثَةٌ', 'أَرْبَعَةٌ', 'خَمْسَةٌ', 'سِتَّةٌ', 'سَبْعَةٌ', 'ثَمَانِيَةٌ', 'تِسْعَةٌ'];
            const puluhan = ['', 'عَشَرَةٌ', 'عِشْرُوْنَ', 'ثَلَاثُوْنَ', 'أَرْبَعُوْنَ', 'خَمْسُوْنَ', 'سِتُّوْنَ', 'سَبْعُوْنَ', 'ثَمَانُوْنَ', 'تِسْعُوْنَ'];
            const belasan = ['عَشَرَةٌ', 'أَحَدَ عَشَرَ', 'اِثْنَا عَشَرَ', 'ثَلَاثَةَ عَشَرَ', 'أَرْبَعَةَ عَشَرَ', 'خَمْسَةَ عَشَرَ', 'سِتَّةَ عَشَرَ', 'سَبْعَةَ عَشَرَ', 'ثَمَانِيَةَ عَشَرَ', 'تِسْعَةَ عَشَرَ'];
            const ratusan = ['', 'مِائَةٌ', 'مِائَتَانِ', 'ثَلَاثُمِائَةٍ', 'أَرْبَعُمِائَةٍ', 'خَمْسُمِائَةٍ', 'سِتُّمِائَةٍ', 'سَبْعُمِائَةٍ', 'ثَمَانُمِائَةٍ', 'تِسْعُمِائَةٍ'];
            const ribuan = ['', 'أَلْفٌ', 'أَلْفَانِ', 'ثَلَاثَةُ آلَافٍ', 'أَرْبَعَةُ آلَافٍ', 'خَمْسَةُ آلَافٍ', 'سِتَّةُ آلَافٍ', 'سَبْعَةُ آلَافٍ', 'ثَمَانِيَةُ آلَافٍ', 'تِسْعَةُ آلَافٍ'];

            let res = [];
            let rib = Math.floor(n / 1000);
            let rem = n % 1000;
            let rat = Math.floor(rem / 100);
            rem = rem % 100;
            let pul = Math.floor(rem / 10);
            let sat = rem % 10;

            if (rib > 0) res.push(ribuan[rib]);
            if (rat > 0) res.push(ratusan[rat]);

                res.push(belasan[rem - 10]);
            } else {
                let parts = [];
                if (sat > 0 && pul > 0) {
                    parts.push(satuan[sat]);
                    parts.push(puluhan[pul]);
                } else if (sat > 0) {
                    parts.push(satuan[sat]);
                } else if (pul > 0) {
                    parts.push(puluhan[pul]);
                }
                if (parts.length > 0) res.push(parts.join(' وَ'));
            }

            return res.join(' وَ');

        // --- FIREBASE HOOK ---
        const useFirebaseData = (activeSemester) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authUser, setAuthUser] = useState(null);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await window.signInWithCustomToken(window.auth, __initial_auth_token);
                    } else {
                        await window.signInAnonymously(window.auth);
                    }
                };
                initAuth();
                const unsubscribe = window.onAuthStateChanged(window.auth, u => setAuthUser(u));
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!authUser || !activeSemester) {
                    setLoading(false);
                    return;
                }
                
                setLoading(true);
                const docId = `content_${activeSemester.tahun.replace(/\//g, '-')}_${activeSemester.semester.toLowerCase()}`;

                }, (error) => {

                        </div>
                        <div className="bg-white p-6 rounded-xl border shadow-sm"><div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="font-bold text-lg text-slate-700">Data Wali Kelas</h3><select className="border p-1.5 rounded text-sm bg-slate-50" value={walasFilter} onChange={e=>setWalasFilter(e.target.value)}><option value="">Semua Kelas</option>{(data.kelas || []).map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}</select></div><div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">{classesToEdit.length > 0 ? classesToEdit.map(c => (<div key={c.id} className="p-3 border rounded-lg bg-slate-50"><label className="block text-xs font-bold text-slate-500 uppercase mb-1">Kelas {c.nama}</label><input type="text" className="w-full p-2 border rounded focus:ring-2 focus:ring-secondary outline-none text-sm mb-2" placeholder="Nama Wali Kelas (Latin)" value={(localData.wali_kelas_per_kelas && localData.wali_kelas_per_kelas[c.nama]) || ''} onChange={e => handleWalasChange(c.nama, e.target.value)}/><input type="text" className="w-full p-2 border rounded focus:ring-2 focus:ring-secondary outline-none text-sm font-pegon" dir="rtl" placeholder="Nama Wali Kelas (Pegon) - Rapor Pondok" value={(localData.wali_kelas_pegon_per_kelas && localData.wali_kelas_pegon_per_kelas[c.nama]) || ''} onChange={e => handleWalasPegonChange(c.nama, e.target.value)}/></div>)) : <div className="text-center text-slate-400 py-4">Tidak ada data kelas</div>}</div></div>

        const DataPegonPondok = ({ data, setData, notify }) => {
            const [kepsek, setKepsek] = useState(data.sekolah?.kepalaSekolahPegon || '');
            const [kelasBuffer, setKelasBuffer] = useState({});
            const [siswaBuffer, setSiswaBuffer] = useState({});
            const [selKelas, setSelKelas] = useState('');
            const fileInputRef = useRef(null);

            useEffect(() => {
                setKepsek(data.sekolah?.kepalaSekolahPegon || '');
                const kBuf = {};
                (data.kelas || []).forEach(k => {
                    kBuf[k.id] = {
                        nama_pegon: k.nama_pegon || '',
                        wali_kelas_pegon: (data.logo?.wali_kelas_pegon_per_kelas || {})[k.nama] || ''
                    };
                });
                setKelasBuffer(kBuf);

                const sBuf = {};
                (data.siswa || []).forEach(s => {
                    sBuf[s.id] = s.nama_pegon || '';
                });
                setSiswaBuffer(sBuf);
            }, [data]);

            const handleSave = () => {
                setData(prev => {
                    const next = { ...prev };
                    
                    next.sekolah = { ...next.sekolah, kepalaSekolahPegon: kepsek };
                    
                    next.kelas = (next.kelas || []).map(k => ({
                        ...k,
                        nama_pegon: kelasBuffer[k.id]?.nama_pegon !== undefined ? kelasBuffer[k.id].nama_pegon : k.nama_pegon
                    }));
                    
                    next.logo = { ...next.logo };
                    next.logo.wali_kelas_pegon_per_kelas = { ...(next.logo.wali_kelas_pegon_per_kelas || {}) };
                    (next.kelas || []).forEach(k => {
                        if (kelasBuffer[k.id]?.wali_kelas_pegon !== undefined) {
                            next.logo.wali_kelas_pegon_per_kelas[k.nama] = kelasBuffer[k.id].wali_kelas_pegon;
                        }
                    });

                    next.siswa = (next.siswa || []).map(s => ({
                        ...s,
                        nama_pegon: siswaBuffer[s.id] !== undefined ? siswaBuffer[s.id] : s.nama_pegon
                    }));

                    return next;
                });
                notify('Data Pegon Pondok berhasil disimpan!', 'success');
            };

            const students = useMemo(() => (data.siswa || []).filter(s => s.kelas === selKelas), [data.siswa, selKelas]);

            const downloadTemplate = () => {
                if (!selKelas) return notify('Pilih kelas terlebih dahulu', 'error');
                if (students.length === 0) return notify('Tidak ada siswa di kelas ini', 'error');
                
                const headers = [['NOMOR INDUK', 'NAMA LATIN', 'NAMA PEGON']];
                const rows = students.map(s => [s.nisn, s.nama, siswaBuffer[s.id] !== undefined ? siswaBuffer[s.id] : (s.nama_pegon || '')]);
                
                const wb = XLSX.utils.book_new(); 
                const ws = XLSX.utils.aoa_to_sheet([...headers, ...rows]); 
                XLSX.utils.book_append_sheet(wb, ws, "Data Pegon"); 
                XLSX.writeFile(wb, `Data_Pegon_${selKelas}.xlsx`);
            };

            const handleImport = (e) => {
                const file = e.target.files[0]; 
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const fileData = new Uint8Array(evt.target.result); 
                    const wb = XLSX.read(fileData, { type: 'array' }); 
                    const ws = wb.Sheets[wb.SheetNames[0]]; 
                    const json = XLSX.utils.sheet_to_json(ws);
                    
                    let count = 0;
                    const newSiswaBuffer = { ...siswaBuffer };

                    json.forEach(row => {
                        const rawNisn = row['NOMOR INDUK'] || row['Nomor Induk'] || row['nomor induk'] || row['NISN'] || row['nisn'];
                        const pegonName = row['NAMA PEGON'] || row['Nama Pegon'] || row['nama pegon'];
                        
                        if (!rawNisn || pegonName === undefined) return;
                        
                        const nisnStr = String(rawNisn).trim();
                        const siswa = (data.siswa || []).find(s => String(s.nisn).trim() === nisnStr);
                        
                        if (siswa) {
                            newSiswaBuffer[siswa.id] = String(pegonName).trim();
                            count++;
                        }
                    });

                    setSiswaBuffer(newSiswaBuffer);
                    notify(`Berhasil memuat ${count} nama Pegon ke draf. Jangan lupa klik SIMPAN!`, 'success');
                }; 
                reader.readAsArrayBuffer(file); 
                e.target.value = null; // Reset input
            };

            return (
                <div className="space-y-6 animate-fade">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                        <div>
                            <h2 className="text-xl font-bold">Data Khusus Rapor Pondok (Pegon)</h2>
                            <p className="text-sm text-slate-500">Isi dengan bahasa Arab murni tanpa menyertakan gelar</p>
                        </div>
                        <button onClick={handleSave} className="bg-emerald-600 text-white px-4 py-2 rounded-lg flex gap-2 shadow hover:bg-emerald-700 transition font-medium text-sm">
                            <Icon name="save" size={16}/> Simpan Perubahan
                        </button>
                    </div>
                    
                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl border shadow-sm h-fit">
                            <h3 className="font-bold text-lg mb-4 border-b pb-2">Kepala Sekolah & Wali Kelas</h3>
                            <div className="mb-4">
                                <label className="block text-sm font-medium mb-1">Kepala Sekolah (Pegon)</label>
                                <input type="text" className="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 font-pegon text-xl" dir="rtl" value={kepsek} onChange={e => setKepsek(e.target.value)} placeholder="Contoh: أوسطوانة" />
                            </div>
                            
                            <div className="overflow-x-auto mt-6">
                                <table className="w-full text-sm text-left border">
                                    <thead className="bg-slate-50 border-b">
                                        <tr>
                                            <th className="p-2 border-r">Kelas</th>
                                            <th className="p-2 border-r">Nama Kelas (Pegon)</th>
                                            <th className="p-2">Wali Kelas (Pegon)</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {(data.kelas || []).map(k => (
                                            <tr key={k.id}>
                                                <td className="p-2 font-medium border-r">{k.nama}</td>
                                                <td className="p-2 border-r"><input type="text" className="w-full border p-1.5 rounded font-pegon text-lg text-right" dir="rtl" value={kelasBuffer[k.id]?.nama_pegon || ''} onChange={e => setKelasBuffer(p => ({...p, [k.id]: {...p[k.id], nama_pegon: e.target.value}}))} placeholder={toArabicNum(k.nama)} /></td>
                                                <td className="p-2"><input type="text" className="w-full border p-1.5 rounded font-pegon text-lg text-right" dir="rtl" value={kelasBuffer[k.id]?.wali_kelas_pegon || ''} onChange={e => setKelasBuffer(p => ({...p, [k.id]: {...p[k.id], wali_kelas_pegon: e.target.value}}))} placeholder="Nama Walas Pegon" /></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border shadow-sm">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 border-b pb-2 gap-3">
                                <h3 className="font-bold text-lg">Nama Siswa (Pegon)</h3>
                                <div className="flex gap-2 w-full sm:w-auto flex-wrap">
                                    {selKelas && (
                                        <>
                                            <button onClick={downloadTemplate} className="bg-slate-600 text-white px-3 py-1.5 rounded flex gap-1 shadow hover:bg-slate-700 transition items-center font-medium text-xs">
                                                <Icon name="download" size={14}/> Format
                                            </button>
                                            <button onClick={() => fileInputRef.current.click()} className="bg-emerald-600 text-white px-3 py-1.5 rounded flex gap-1 shadow hover:bg-emerald-700 transition items-center font-medium text-xs">
                                                <Icon name="upload" size={14}/> Import
                                            </button>
                                            <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls" onChange={handleImport} />
                                        </>
                                    )}
                                    <select className="border p-1.5 rounded text-sm bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500 w-full sm:w-auto" value={selKelas} onChange={e=>setSelKelas(e.target.value)}>
                                        <option value="">Pilih Kelas</option>
                                        {(data.kelas || []).map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                                    </select>
                                </div>
                            </div>
                            {selKelas ? (
                                <div className="overflow-x-auto max-h-[500px]">
                                    <table className="w-full text-sm text-left border">
                                        <thead className="bg-slate-50 border-b sticky top-0 z-10">
                                            <tr>
                                                <th className="p-2 w-10 border-r">No</th>
                                                <th className="p-2 border-r">Nama Latin</th>
                                                <th className="p-2">Nama Pegon (Bisa diedit manual)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {students.map((s, i) => (
                                                <tr key={s.id} className="hover:bg-slate-50">
                                                    <td className="p-2 text-center text-slate-500 border-r">{i+1}</td>
                                                    <td className="p-2 font-medium border-r text-xs">{s.nama}</td>
                                                    <td className="p-2">
                                                        <input type="text" className="w-full border p-1.5 rounded font-pegon text-xl focus:ring-2 focus:ring-blue-500 text-right" dir="rtl" value={siswaBuffer[s.id] !== undefined ? siswaBuffer[s.id] : ''} onChange={e => setSiswaBuffer(p => ({...p, [s.id]: e.target.value}))} placeholder={toPegon(s.nama)} />
                                                    </td>
                                                </tr>
                                            ))}
                                            {students.length === 0 && <tr><td colSpan="3" className="p-4 text-center text-slate-400">Tidak ada siswa</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            ) : <div className="text-center py-10 text-slate-400">Pilih kelas untuk mengatur nama siswa</div>}
                        </div>
                    </div>
                </div>
            );
        };

        const MappingRapor = ({ dataMapel, classList, setData, notify }) => { 
            const [edits, setEdits] = useState(dataMapel || []); 
            const [selectedClass, setSelectedClass] = useState('');
            const [copySourceClass, setCopySourceClass] = useState('');

            useEffect(() => { setEdits(dataMapel || []); }, [dataMapel]);
            
            const handleToggleActive = (mapelId, className) => { 
                setEdits(prev => prev.map(m => { 
                    if (String(m.id) === String(mapelId)) { 
                        const currentClasses = m.kelas || []; 
                        let newClasses; 
                        if (currentClasses.includes(className)) { 
                            newClasses = currentClasses.filter(c => c !== className); 
                        } else { 
                            newClasses = [...currentClasses, className]; 
                        } 
                        return { ...m, kelas: newClasses }; 
                    } 
                    return m; 
                })); 
            };
            
            const handlePerKelasChange = (id, className, field, val) => {
                setEdits(prev => prev.map(m => {
                    if (String(m.id) === String(id)) {
                        const specificField = `${field}_per_kelas`;
                        return { ...m, [specificField]: { ...(m[specificField] || {}), [className]: val } };
                    }
                    return m;
                }));
            };

            const handleCopyMapping = () => {
                if (!copySourceClass) return notify("Pilih kelas sumber untuk disalin", "error");
                if (copySourceClass === selectedClass) return notify("Tidak bisa menyalin dari kelas yang sama", "error");
                if (!confirm(`Yakin ingin menyalin mapping dari kelas ${copySourceClass} ke ${selectedClass}?\n\nMapping (Urutan, Kelompok, Parent Group, KKM & Status Aktif) sebelumnya di kelas ${selectedClass} akan digantikan dengan data dari ${copySourceClass}.`)) return;

                const newEdits = edits.map(m => {
                    const newMapel = { ...m };
                    
                    const isActiveInSource = newMapel.kelas && newMapel.kelas.includes(copySourceClass);
                    let currentClasses = newMapel.kelas || [];
                    
                    if (isActiveInSource && !currentClasses.includes(selectedClass)) {
                        newMapel.kelas = [...currentClasses, selectedClass];
                    } else if (!isActiveInSource && currentClasses.includes(selectedClass)) {
                        newMapel.kelas = currentClasses.filter(c => c !== selectedClass);
                    }

                    const propsToCopy = ['urutan', 'kelompok', 'parent', 'kkm'];
                    propsToCopy.forEach(prop => {
                        const specificField = `${prop}_per_kelas`;
                        let sourceVal = newMapel[specificField] && newMapel[specificField][copySourceClass] !== undefined 
                                            ? newMapel[specificField][copySourceClass] 
                                            : (prop === 'parent' ? (newMapel.parent || '') : newMapel[prop]);
                        
                        if (sourceVal === undefined) sourceVal = ''; 
                        
                        newMapel[specificField] = { ...(newMapel[specificField] || {}), [selectedClass]: sourceVal };
                    });

                    return newMapel;
                });

                setEdits(newEdits);
                setData(prev => ({ ...prev, mapel: newEdits }));
                setCopySourceClass('');
                notify(`Berhasil menyalin & menyimpan mapping dari kelas ${copySourceClass}!`, "success");
            };

            const save = () => { 
                const sanitizedEdits = JSON.parse(JSON.stringify(edits));
                setData(prev => ({ ...prev, mapel: sanitizedEdits })); 
                notify("Mapping berhasil disimpan"); 
            };
            
            const sortedMapels = [...edits].sort((a,b)=> {
                const valA = a.urutan_per_kelas && a.urutan_per_kelas[selectedClass] !== undefined ? a.urutan_per_kelas[selectedClass] : a.urutan;
                const valB = b.urutan_per_kelas && b.urutan_per_kelas[selectedClass] !== undefined ? b.urutan_per_kelas[selectedClass] : b.urutan;
                return valA - valB;
            });
            
            return (
                <div className="space-y-6 animate-fade">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                        <h2 className="text-2xl font-bold text-slate-800">Mapping Rapor (Per Kelas)</h2>
                        <div className="flex gap-2 w-full md:w-auto">
                            <select className="border p-2 rounded-lg bg-white text-sm w-full md:w-64 font-bold text-slate-700 focus:ring-2 focus:ring-secondary outline-none" value={selectedClass} onChange={e=>{setSelectedClass(e.target.value); setCopySourceClass('');}}>
                                <option value="">-- Pilih Kelas --</option>
                                {(classList||[]).map(c=><option key={c.id} value={c.nama}>Pengaturan Kelas {c.nama}</option>)}
                            </select>
                            <button onClick={save} className="bg-blue-600 text-white px-4 py-2 rounded-lg shadow flex gap-2 items-center hover:bg-blue-700 transition whitespace-nowrap"><Icon name="save" size={18}/> Simpan</button>
                        </div>
                    </div>
                    
                    {selectedClass ? (
                        <div className="space-y-4">
                            <div className="flex items-center gap-3 p-3 bg-indigo-50 border border-indigo-100 rounded-lg text-sm w-full">
                                <Icon name="copy" size={16} className="text-indigo-600 shrink-0"/>
                                <span className="font-medium text-indigo-900 shrink-0">Salin mapping dari kelas:</span>
                                <select className="border border-slate-300 rounded p-1.5 outline-none focus:ring-2 focus:ring-indigo-500 bg-white flex-1 max-w-xs" value={copySourceClass} onChange={e=>setCopySourceClass(e.target.value)}>
                                    <option value="">-- Pilih Kelas Sumber --</option>
                                    {(classList||[]).filter(c => c.nama !== selectedClass).map(c => <option key={c.id} value={c.nama}>{c.nama}</option>)}
                                </select>
                                <button onClick={handleCopyMapping} className="bg-indigo-600 text-white px-4 py-1.5 rounded hover:bg-indigo-700 transition font-medium shadow-sm shrink-0">Terapkan & Simpan</button>
                            </div>

                            <div className="bg-white rounded-xl shadow border border-slate-200 overflow-hidden">
                                <div className="p-4 bg-blue-50 border-b flex items-center gap-2 text-blue-800 text-sm">
                                    <Icon name="info" size={16}/>
                                    <span>Menampilkan pengaturan mata pelajaran untuk <b>Kelas {selectedClass}</b>. Perubahan di sini tidak akan memengaruhi kelas lain.</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-slate-50 border-b text-slate-600 uppercase text-xs">
                                            <tr>
                                                <th className="p-3 w-16 text-center">Urut</th>
                                                <th className="p-3">Mata Pelajaran</th>
                                                <th className="p-3 w-24">Kelompok</th>
                                                <th className="p-3">Parent Group</th>
                                                <th className="p-3 w-20 text-center">KKM</th>
                                                <th className="p-3 w-32 text-center bg-yellow-50/50">Aktif di {selectedClass}?</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {sortedMapels.length > 0 ? sortedMapels.map(m => { 
                                                const isActive = m.kelas && m.kelas.includes(selectedClass); 
                                                const currentUrutan = m.urutan_per_kelas && m.urutan_per_kelas[selectedClass] !== undefined ? m.urutan_per_kelas[selectedClass] : m.urutan;
                                                const currentKelompok = m.kelompok_per_kelas && m.kelompok_per_kelas[selectedClass] !== undefined ? m.kelompok_per_kelas[selectedClass] : m.kelompok;
                                                const currentParent = m.parent_per_kelas && m.parent_per_kelas[selectedClass] !== undefined ? m.parent_per_kelas[selectedClass] : (m.parent || '');
                                                const currentKkm = m.kkm_per_kelas && m.kkm_per_kelas[selectedClass] !== undefined ? m.kkm_per_kelas[selectedClass] : m.kkm;

                                                return (
                                                    <tr key={m.id} className={`hover:bg-slate-50 ${!isActive ? 'opacity-50 bg-slate-50' : ''}`}>
                                                        <td className="p-2"><input type="number" className="w-full text-center border rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={currentUrutan} onChange={e=>{const v = parseInt(e.target.value); handlePerKelasChange(m.id, selectedClass, 'urutan', isNaN(v)?'':v);}}/></td>
                                                        <td className="p-2 font-medium">{m.nama}</td>
                                                        <td className="p-2"><select className="w-full border rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={currentKelompok} onChange={e=>handlePerKelasChange(m.id, selectedClass, 'kelompok', e.target.value)}><option value="A">A</option><option value="B">B</option><option value="C">C</option></select></td>
                                                        <td className="p-2"><input type="text" className="w-full border rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={currentParent} placeholder="-" onChange={e=>handlePerKelasChange(m.id, selectedClass, 'parent', e.target.value)}/></td>
                                                        <td className="p-2"><input type="number" className="w-full text-center border rounded p-1.5 focus:ring-2 focus:ring-blue-500 outline-none" value={currentKkm} onChange={e=>{const v = parseInt(e.target.value); handlePerKelasChange(m.id, selectedClass, 'kkm', isNaN(v)?'':v);}}/></td>
                                                        <td className="p-2 text-center bg-yellow-50/30"><label className="flex items-center justify-center cursor-pointer"><input type="checkbox" className="w-5 h-5 accent-emerald-500 cursor-pointer" checked={isActive} onChange={() => handleToggleActive(m.id, selectedClass)}/></label></td>
                                                    </tr>
                                                ); 
                                            }) : <tr><td colSpan="6" className="p-8 text-center text-slate-400">Tidak ada data mapel</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    ) : ( <div className="flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-dashed text-slate-400"><Icon name="arrow-up-circle" size={48} className="mb-4 text-slate-300"/><p className="text-lg font-medium">Silakan pilih kelas terlebih dahulu</p></div> )}
                </div>
            );
        };

        const TableView = ({ title, heads, data, renderRow, onAdd, onEdit, onDelete, searchKeys=[], filterOptions=[], filterKey='', onImport, onDownloadTemplate }) => {
            const [query, setQuery] = useState(''); const [filterVal, setFilterVal] = useState(''); const fileInputRef = useRef(null);
            const safeData = data || [];
            const filteredData = safeData.filter(item => { const matchesSearch = !query || searchKeys.some(key => String(item[key]).toLowerCase().includes(query.toLowerCase())); let matchesFilter = true; if (filterVal && filterKey) { const itemVal = item[filterKey]; matchesFilter = Array.isArray(itemVal) ? itemVal.includes(filterVal) : String(itemVal) === String(filterVal); } return matchesSearch && matchesFilter; });
            return (
                <div className="space-y-4 animate-fade">
                    <div className="flex flex-col md:flex-row justify-between items-center gap-4"><h2 className="text-2xl font-bold text-slate-800">{title}</h2><div className="flex gap-2 w-full md:w-auto flex-wrap justify-end">{filterOptions.length > 0 && (<select className="border p-2 rounded-lg bg-white text-sm focus:ring-2 focus:ring-secondary outline-none" value={filterVal} onChange={e=>setFilterVal(e.target.value)}><option value="">Semua {filterKey === 'kelas' ? 'Kelas' : 'Filter'}</option>{filterOptions.map(opt => <option key={opt.id} value={opt.nama}>{opt.nama}</option>)}</select>)}{searchKeys.length > 0 && (<div className="relative flex-1 md:w-64 min-w-[200px]"><span className="absolute left-3 top-2.5 text-slate-400"><Icon name="search" size={16}/></span><input type="text" placeholder="Cari data..." className="pl-9 pr-4 py-2 border rounded-lg w-full focus:ring-2 focus:ring-secondary outline-none text-sm" value={query} onChange={e=>setQuery(e.target.value)} /></div>)}{onImport && (<><input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls" onChange={onImport} /><button onClick={() => fileInputRef.current.click()} className="bg-emerald-600 text-white px-4 py-2 rounded-lg flex gap-2 text-sm shadow hover:bg-emerald-700 transition items-center font-medium"><Icon name="upload" size={16}/> Import</button></>)}{onDownloadTemplate && (<button onClick={onDownloadTemplate} className="bg-slate-600 text-white px-4 py-2 rounded-lg flex gap-2 text-sm shadow hover:bg-slate-700 transition items-center font-medium"><Icon name="download" size={16}/> Format</button>)}{onAdd && <button onClick={onAdd} className="bg-secondary text-white px-4 py-2 rounded-lg flex gap-2 text-sm shadow hover:bg-blue-600 transition items-center font-medium"><Icon name="plus" size={16}/> Tambah</button>}</div></div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden"><div className="overflow-x-auto"><table className="w-full text-left text-sm"><thead className="bg-slate-50 border-b text-slate-600 uppercase text-xs tracking-wider"><tr><th className="p-4 w-12 text-center">No</th>{heads.map((h,i)=><th key={i} className="p-4 font-semibold">{h}</th>)}{(onEdit || onDelete) && <th className="p-4 text-right">Aksi</th>}</tr></thead><tbody className="divide-y divide-slate-100">{filteredData.length > 0 ? filteredData.map((item,i)=>(<tr key={item.id || i} className="hover:bg-slate-50 transition-colors"><td className="p-4 text-center text-slate-500">{i+1}</td>{renderRow(item)}{(onEdit || onDelete) && <td className="p-4 text-right"><div className="flex justify-end gap-2">{onEdit && <button onClick={() => onEdit(item)} className="p-1.5 text-blue-600 bg-blue-50 rounded hover:bg-blue-100"><Icon name="edit" size={16}/></button>}{onDelete && <button onClick={() => onDelete(item.id)} className="p-1.5 text-red-600 bg-red-50 rounded hover:bg-red-100"><Icon name="trash-2" size={16}/></button>}</div></td>}</tr>)) : <tr><td colSpan={heads.length + 2} className="p-8 text-center text-slate-400 italic">Data tidak ditemukan</td></tr>}</tbody></table></div></div>
                    <div className="text-xs text-slate-400 text-right">Menampilkan {filteredData.length} dari {safeData.length} data</div>
                </div>
            );
        };

        const Dashboard = ({ data }) => {
            const { siswa, guru, kelas, mapel } = data;
            const stats = [{ title: 'Total Siswa', count: (siswa||[]).length, color: 'bg-blue-500', icon: 'users' }, { title: 'Total Guru', count: (guru||[]).length, color: 'bg-emerald-500', icon: 'graduation-cap' }, { title: 'Rombel', count: (kelas||[]).length, color: 'bg-amber-500', icon: 'school' }, { title: 'Mata Pelajaran', count: (mapel||[]).length, color: 'bg-indigo-500', icon: 'book-open' }];
            return (
                <div className="space-y-6 animate-fade">
                    <h2 className="text-2xl font-bold text-slate-800">Dashboard Ikhtisar</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">{stats.map((s,i) => (<div key={i} className="bg-white p-6 rounded-xl border border-slate-100 shadow-sm flex items-center gap-4 hover:shadow-md transition cursor-default"><div className={`p-4 rounded-xl text-white ${s.color} shadow-lg shadow-${s.color}/30`}><Icon name={s.icon} size={24}/></div><div><p className="text-slate-500 text-xs font-bold uppercase tracking-wider">{s.title}</p><h3 className="text-3xl font-bold text-slate-800">{s.count}</h3></div></div>))}</div>
                    <div className="bg-white p-6 rounded-xl border shadow-sm"><h3 className="font-bold mb-4">Informasi Akademik</h3><ul className="space-y-3 text-sm"><li className="flex justify-between border-b pb-2"><span>Tahun Ajaran Aktif</span><span className="font-bold text-blue-600">{(data.sekolah||{}).tahunPelajaran} - {(data.sekolah||{}).semester}</span></li><li className="flex justify-between border-b pb-2"><span>Nama Sekolah</span><span className="font-medium text-right w-1/2">{(data.sekolah||{}).nama}</span></li><li className="flex justify-between border-b pb-2"><span>Kepala Sekolah</span><span className="font-medium">{(data.sekolah||{}).kepalaSekolah}</span></li></ul></div>
                </div>
            );
        };

        const MonitoringNilai = ({ data }) => {
            const guruStats = useMemo(() => {
                return (data.guru || []).map(g => {
                    const mapelObj = (data.mapel || []).find(m => m.nama.toLowerCase() === (g.mapel || '').trim().toLowerCase());
                    const mapelId = mapelObj ? mapelObj.id : null;
                    const targetClasses = g.kelasMengajar || [];
                    
                    const classStats = targetClasses.map(className => {
                        const studentsInClass = (data.siswa || []).filter(s => s.kelas === className);
                        const total = studentsInClass.length;
                        const isKelas12 = Boolean(className.toUpperCase().startsWith('XII') || className.startsWith('12'));
                        
                        const parts = isKelas12 
                            ? [{key: 's1', label: 'S1'}, {key: 's2', label: 'S2'}, {key: 's3', label: 'S3'}, {key: 's4', label: 'S4'}, {key: 's5', label: 'S5'}, {key: 'sas', label: 'SAS'}, {key: 'psaj_praktik', label: 'PSAJ P.'}, {key: 'psaj_tulis', label: 'PSAJ T.'}]
                            : [{key: 's1', label: 'S1'}, {key: 's2', label: 'S2'}, {key: 's3', label: 'S3'}, {key: 's4', label: 'S4'}, {key: 's5', label: 'S5'}, {key: 'sts', label: 'STS'}, {key: 'sas', label: 'SAS'}];
                        
                        let totalFilledPercentage = 0;

                        const partStats = parts.map(p => {
                            let filled = 0;
                            if (mapelId && total > 0) {
                                studentsInClass.forEach(s => {
                                    const gradeRecord = (data.nilaiMapel || []).find(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(mapelId));
                                    if (gradeRecord && gradeRecord[p.key] !== undefined && gradeRecord[p.key] !== '') {
                                        filled++;
                                    }
                                });
                            }
                            const percentage = total > 0 ? Math.round((filled / total) * 100) : 0;
                            totalFilledPercentage += percentage;
                            return { ...p, filled, percentage };
                        });

                        const overallPercentage = parts.length > 0 ? Math.round(totalFilledPercentage / parts.length) : 0;

                        return { className, total, partStats, overallPercentage };
                    });

                    const isAllDone = classStats.length > 0 && classStats.every(cs => cs.overallPercentage === 100);
                    const isAnyStarted = classStats.some(cs => cs.overallPercentage > 0);
                    const overallStatus = isAllDone ? 'SELESAI' : isAnyStarted ? 'PROSES' : 'KOSONG';

                    return { ...g, classStats, overallStatus };
                });
            }, [data.guru, data.mapel, data.siswa, data.nilaiMapel]);

            return (
                <div className="space-y-6 animate-fade">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                        <h2 className="text-xl font-bold">Monitoring Progres Nilai Guru</h2>
                    </div>
                    <div className="bg-white rounded-xl shadow border overflow-hidden">
                        <div className="p-4 bg-blue-50 border-b flex items-center gap-2 text-blue-800 text-sm">
                            <Icon name="info" size={16}/>
                            <span>Menampilkan detail persentase pengisian nilai <b>per bagian asesmen</b> di setiap kelas yang diampu.</span>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-3 w-10 text-center">No</th>
                                        <th className="p-3 w-48">Nama Guru</th>
                                        <th className="p-3 w-40">Mata Pelajaran</th>
                                        <th className="p-3 min-w-[400px]">Detail Progres Penilaian Per Kelas</th>
                                        <th className="p-3 w-28 text-center">Status Total</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {guruStats.map((g, idx) => (
                                        <tr key={g.id} className="hover:bg-slate-50">
                                            <td className="p-3 text-center align-top">{idx + 1}</td>
                                            <td className="p-3 font-medium align-top">{g.nama}</td>
                                            <td className="p-3 align-top">
                                                <span className="font-semibold text-blue-700 bg-blue-50 px-2 py-1 rounded text-xs">{g.mapel}</span>
                                            </td>
                                            <td className="p-3">
                                                {g.classStats.length > 0 ? (
                                                    <div className="space-y-4">
                                                        {g.classStats.map((cs, i) => (
                                                            <div key={i} className="flex flex-col bg-white p-3 rounded-lg border border-slate-200 shadow-sm">
                                                                <div className="flex justify-between items-center text-xs mb-3 border-b pb-2">
                                                                    <span className="font-bold text-slate-800 text-sm">Kelas {cs.className} <span className="text-slate-500 font-normal text-xs">({cs.total} Siswa)</span></span>
                                                                    <span className="text-indigo-600 font-bold bg-indigo-50 px-2 py-0.5 rounded">Rata-rata: {cs.overallPercentage}%</span>
                                                                </div>
                                                                <div className="flex flex-wrap gap-2">
                                                                    {cs.partStats.map((ps, j) => (
                                                                        <div key={j} className="flex flex-col items-center justify-center py-1.5 px-2 bg-slate-50 rounded border border-slate-200 min-w-[45px]">
                                                                            <span className="text-[10px] font-bold text-slate-500 mb-1">{ps.label}</span>
                                                                            <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${ps.percentage === 100 ? 'bg-emerald-100 text-emerald-700' : ps.percentage > 0 ? 'bg-blue-100 text-blue-700' : 'bg-rose-100 text-rose-600'}`}>
                                                                                {ps.percentage}%
                                                                            </span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <span className="text-xs text-slate-400 italic">Belum ada kelas yang diampu</span>
                                                )}
                                            </td>
                                            <td className="p-3 text-center align-top">
                                                {g.overallStatus === 'SELESAI' ? <span className="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-[10px] font-bold">SELESAI</span> : g.overallStatus === 'PROSES' ? <span className="px-2 py-1 bg-blue-100 text-blue-700 rounded text-[10px] font-bold">PROSES</span> : <span className="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[10px] font-bold">KOSONG</span>}
                                            </td>
                                        </tr>
                                    ))}
                                    {guruStats.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Tidak ada data guru.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const InputNilai = ({ data, setData, notify, user, updateData }) => {
            const [selKelas, setSelKelas] = useState(''); 
            const [selMapel, setSelMapel] = useState(''); 
            const [buffer, setBuffer] = useState({}); 
            const fileInputRef = useRef(null);

            const guruProfiles = useMemo(() => {
                if (user.role === 'admin') return [];
                
                let primaryMatch = null;
                if (user.id && String(user.id).startsWith('usr-g-')) { 
                    const id = user.id.replace('usr-g-', ''); 
                    primaryMatch = (data.guru || []).find(g => String(g.id) === String(id)); 
                }
                if (!primaryMatch && user.nip && String(user.nip).trim() !== '' && String(user.nip).trim() !== '-') { 
                    primaryMatch = (data.guru || []).find(g => String(g.nip).trim() === String(user.nip).trim()); 
                }
                if (!primaryMatch && user.nama) { 
                    primaryMatch = (data.guru || []).find(g => g.nama && String(g.nama).trim().toLowerCase() === String(user.nama).trim().toLowerCase()); 
                }

                if (!primaryMatch) return [];

                return (data.guru || []).filter(g => {
                    const hasValidNip = primaryMatch.nip && String(primaryMatch.nip).trim() !== '-' && String(primaryMatch.nip).trim() !== '';
                    const sameNip = hasValidNip && g.nip && String(g.nip).trim() === String(primaryMatch.nip).trim();
                    const hasValidName = primaryMatch.nama && String(primaryMatch.nama).trim() !== '';
                    const sameName = hasValidName && g.nama && String(g.nama).trim().toLowerCase() === String(primaryMatch.nama).trim().toLowerCase();
                    return sameNip || sameName;
                });
            }, [user, data.guru]);

            const filteredKelas = useMemo(() => {
                if (user.role === 'admin') return data.kelas || [];
                const myClasses = new Set();
                guruProfiles.forEach(g => {
                    if (Array.isArray(g.kelasMengajar)) {
                        g.kelasMengajar.forEach(c => myClasses.add(c));
                    }
                });
                return (data.kelas || []).filter(k => myClasses.has(k.nama));
            }, [data.kelas, guruProfiles, user.role]);
            
            const availableMapel = useMemo(() => {
                let mapels = (data.mapel || []).filter(m => m.aktif !== false);
                
                if (selKelas) {
                    mapels = mapels.filter(m => m.kelas && m.kelas.includes(selKelas));
                }
                
                if (user.role !== 'admin') {
                    if (!selKelas) return [];

                    const relevantProfiles = guruProfiles.filter(g => (g.kelasMengajar || []).includes(selKelas));
                    const myMapels = relevantProfiles.map(g => (g.mapel || '').trim().toLowerCase());
                    mapels = mapels.filter(m => myMapels.includes(m.nama.trim().toLowerCase()));
                }

                return mapels.sort((a,b) => {
                    const valA = a.urutan_per_kelas && a.urutan_per_kelas[selKelas] !== undefined ? a.urutan_per_kelas[selKelas] : (a.urutan || 99);
                    const valB = b.urutan_per_kelas && b.urutan_per_kelas[selKelas] !== undefined ? b.urutan_per_kelas[selKelas] : (b.urutan || 99);
                    return valA - valB;
                });
            }, [data.mapel, selKelas, guruProfiles, user.role]);

            useEffect(() => { if (filteredKelas.length === 1 && !selKelas) setSelKelas(filteredKelas[0].nama); if (selKelas && !filteredKelas.find(k => k.nama === selKelas)) setSelKelas(''); }, [filteredKelas, selKelas]);
            useEffect(() => { if (availableMapel.length === 1 && !selMapel) setSelMapel(availableMapel[0].id); if (selMapel && !availableMapel.find(m => String(m.id) === String(selMapel))) setSelMapel(''); }, [availableMapel, selMapel]);

            const isKelas12 = Boolean(selKelas && (selKelas.toUpperCase().startsWith('XII') || selKelas.startsWith('12')));

            const isKoordIPA = user.role === 'admin' || guruProfiles.some(g => {
                const tasks = Array.isArray(g.tugasTambahan) ? g.tugasTambahan : (g.tugasTambahan ? String(g.tugasTambahan).split(',') : []);
                return tasks.some(t => String(t).trim().toLowerCase() === 'koordinator mapel ipa');
            });

            const isKoordIPS = user.role === 'admin' || guruProfiles.some(g => {
                const tasks = Array.isArray(g.tugasTambahan) ? g.tugasTambahan : (g.tugasTambahan ? String(g.tugasTambahan).split(',') : []);
                return tasks.some(t => String(t).trim().toLowerCase() === 'koordinator mapel ips');
            });

            const getAkhirForMapel = (siswaId, mapelNamePattern) => {
                const mapelObj = (data.mapel || []).find(m => m.nama.toLowerCase().includes(mapelNamePattern.toLowerCase()));
                if (!mapelObj) return 0;
                
                const isCurrentEditingMapel = String(mapelObj.id) === String(selMapel);
                const nilai = (data.nilaiMapel || []).find(n => String(n.siswa_id) === String(siswaId) && String(n.mapel_id) === String(mapelObj.id)) || {};
                
                const getVal = (f) => {
                    if (isCurrentEditingMapel && buffer[`${siswaId}-${f}`] !== undefined) {
                        return buffer[`${siswaId}-${f}`];
                    }
                    return nilai[f] !== undefined ? nilai[f] : '';
                };

                const sum = ['s1','s2','s3','s4','s5'].map(k => parseInt(getVal(k))||0).filter(v=>v>0);
                const rerata = sum.length ? Math.round(sum.reduce((a,b)=>a+b,0)/sum.length) : 0;
                const sts = parseInt(getVal('sts')) || 0;
                const sas = parseInt(getVal('sas')) || 0;
                
                let komps = [];
                if (rerata > 0) komps.push(rerata);
                if (!isKelas12 && sts > 0) komps.push(sts);
                if (sas > 0) komps.push(sas);
                return komps.length > 0 ? Math.round(komps.reduce((a,b)=>a+b,0) / komps.length) : 0;
            };

            const getRataRataGabungan = (siswaId, mapelArray) => {
                const scores = mapelArray.map(m => getAkhirForMapel(siswaId, m)).filter(score => score > 0);
                if (scores.length === 0) return 0;
                return Math.round(scores.reduce((a,b) => a+b, 0) / scores.length);
            };

            const handleSave = () => {
                if(!selMapel) return notify('Pilih Mapel dulu', 'error');
                setData((prevData) => {
                    const updatedNilai = [...(prevData.nilaiMapel || [])];
                    const studentsInClass = (prevData.siswa || []).filter(s => s.kelas === selKelas);

                    Object.keys(buffer).forEach(key => {
                        const parts = key.split('-');
                        const siswaIdStr = parts[0];
                        const field = parts.slice(1).join('-');

                        if (isKelas12 && field === 'sts') return; 

                        const idx = updatedNilai.findIndex(n => String(n.siswa_id) === String(siswaIdStr) && String(n.mapel_id) === String(selMapel));
                        
                        let val = buffer[key];
                        if (val !== '') {
                            val = parseInt(val, 10); 
                            if (isNaN(val)) val = '';
                        }

                        if(idx > -1) {
                            updatedNilai[idx] = { ...updatedNilai[idx], [field]: val };
                            if (isKelas12) updatedNilai[idx].sts = ''; 
                        } else {
                            const sId = isNaN(Number(siswaIdStr)) ? siswaIdStr : Number(siswaIdStr);
                            const mId = isNaN(Number(selMapel)) ? selMapel : Number(selMapel);
                            updatedNilai.push({ siswa_id: sId, mapel_id: mId, s1:'',s2:'',s3:'',s4:'',s5:'',sts:'',sas:'',psaj_praktik:'',psaj_tulis:'', [field]: val });
                        }
                    });

                    if (isKelas12) {
                        studentsInClass.forEach(s => {
                            const idx = updatedNilai.findIndex(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(selMapel));
                            if (idx > -1) updatedNilai[idx].sts = '';
                        });
                    }

                    return { ...prevData, nilaiMapel: updatedNilai };
                });
                setBuffer({}); notify('Nilai berhasil disimpan (Nilai lama tertimpa)!', 'success');
            };

            const downloadTemplateNilai = () => { 
                const siswaKelas = (data.siswa || []).filter(s => s.kelas === selKelas); if (siswaKelas.length === 0) return notify('Tidak ada siswa', 'error');
                const headers = isKelas12 
                    ? [['NO', 'NOMOR INDUK', 'NAMA', 'S1', 'S2', 'S3', 'S4', 'S5', 'SAS', 'PSAJ PRAKTIK', 'PSAJ TULIS']]
                    : [['NO', 'NOMOR INDUK', 'NAMA', 'S1', 'S2', 'S3', 'S4', 'S5', 'STS', 'SAS']];
                const rows = siswaKelas.map((s, i) => { 
                    return isKelas12 
                        ? [i + 1, s.nisn, s.nama, '', '', '', '', '', '', '', '']
                        : [i + 1, s.nisn, s.nama, '', '', '', '', '', '', '']; 
                });
                const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet([...headers, ...rows]); XLSX.utils.book_append_sheet(wb, ws, "Nilai"); XLSX.writeFile(wb, `Nilai_${selKelas}.xlsx`);
            };

            const importNilai = (e) => { 
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const fileData = new Uint8Array(evt.target.result); 
                    const wb = XLSX.read(fileData, { type: 'array' }); 
                    const ws = wb.Sheets[wb.SheetNames[0]]; 
                    const json = XLSX.utils.sheet_to_json(ws);
                    
                    updateData((prevData) => {
                        const updatedNilai = [...(prevData.nilaiMapel || [])];
                        let count = 0;
                        json.forEach(row => {
                            const rawNisn = row['NOMOR INDUK'] || row['Nomor Induk'] || row['nomor induk'] || row['NISN'] || row['nisn'];
                            if (!rawNisn) return;
                            const nisnStr = String(rawNisn).trim();
                            const siswa = (prevData.siswa || []).find(s => String(s.nisn).trim() === nisnStr);
                            
                            if (siswa) {
                                let hasUpdates = false;
                                let fieldsToImport = isKelas12 
                                    ? ['S1','S2','S3','S4','S5','SAS','PSAJ PRAKTIK','PSAJ TULIS'] 
                                    : ['S1','S2','S3','S4','S5','STS','SAS'];

                                fieldsToImport.forEach(field => {
                                    let val = row[field];
                                    if (val === undefined) val = row[field.toLowerCase()];
                                    
                                    if (val !== undefined) { 
                                        const mapField = field.toLowerCase().replace(' ', '_'); 
                                        const sIdStr = String(siswa.id);
                                        const mIdStr = String(selMapel);
                                        
                                        const idx = updatedNilai.findIndex(n => String(n.siswa_id) === sIdStr && String(n.mapel_id) === mIdStr);
                                        
                                        let parsedVal = val !== '' ? parseInt(val, 10) : '';
                                        if (isNaN(parsedVal) && parsedVal !== '') parsedVal = '';

                                        if(idx > -1) {
                                            updatedNilai[idx] = { ...updatedNilai[idx], [mapField]: parsedVal };
                                            if (isKelas12) updatedNilai[idx].sts = ''; 
                                        } else {
                                            const sId = isNaN(Number(sIdStr)) ? sIdStr : Number(sIdStr);
                                            const mId = isNaN(Number(mIdStr)) ? mIdStr : Number(mIdStr);
                                            updatedNilai.push({ 
                                                siswa_id: sId, mapel_id: mId, 
                                                s1:'',s2:'',s3:'',s4:'',s5:'',sts:'',sas:'',psaj_praktik:'',psaj_tulis:'', 
                                                [mapField]: parsedVal 
                                            });
                                        }
                                        hasUpdates = true;
                                    }
                                });
                                if (hasUpdates) count++;
                            }
                        });
                        notify(`Berhasil mengimpor dan menyimpan nilai untuk ${count} siswa (Nilai lama tertimpa).`, 'success');
                        return { ...prevData, nilaiMapel: updatedNilai };
                    });
                    setBuffer({}); 
                }; 
                reader.readAsArrayBuffer(file); 
                e.target.value = null;
            };

            const students = useMemo(() => (data.siswa || []).filter(s => s.kelas === selKelas), [data.siswa, selKelas]);
            return (
                <div className="space-y-6 animate-fade">
                    <div className="flex justify-between items-center bg-white p-4 rounded-xl border shadow-sm">
                        <h2 className="text-xl font-bold">Input Nilai Akademik</h2>
                        <div className="flex gap-2">
                            {selKelas && selMapel && (
                                <>
                                    <button onClick={downloadTemplateNilai} className="bg-slate-600 text-white px-3 py-2 rounded-lg flex gap-2 shadow hover:bg-slate-700 transition items-center font-medium text-sm">
                                        <Icon name="download" size={16}/> Format
                                    </button>
                                    <button onClick={() => fileInputRef.current.click()} className="bg-emerald-600 text-white px-3 py-2 rounded-lg flex gap-2 shadow hover:bg-emerald-700 transition items-center font-medium text-sm">
                                        <Icon name="upload" size={16}/> Import
                                    </button>
                                    <input type="file" ref={fileInputRef} className="hidden" accept=".xlsx, .xls" onChange={importNilai} />
                                </>
                            )}
                            <button onClick={handleSave} className="bg-accent text-white px-4 py-2 rounded-lg flex gap-2 hover:bg-emerald-600 shadow transition font-bold text-sm">
                                <Icon name="save" size={16}/> Simpan
                            </button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-4">
                        <select className="p-3 border rounded-lg bg-white shadow-sm" value={selKelas} onChange={e=>setSelKelas(e.target.value)}>
                            <option value="">-- Pilih Kelas --</option>
                            {filteredKelas.map(k=><option key={k.id} value={k.nama}>{k.nama}</option>)}
                        </select>
                        <select className="p-3 border rounded-lg bg-white shadow-sm" value={selMapel} onChange={e=>setSelMapel(e.target.value)} disabled={!selKelas}>
                            <option value="">-- Pilih Mata Pelajaran --</option>
                            {availableMapel.map(m=><option key={m.id} value={m.id}>{m.urutan_per_kelas && m.urutan_per_kelas[selKelas] !== undefined ? m.urutan_per_kelas[selKelas] : (m.urutan || 99)}. {m.nama}</option>)}
                        </select>
                    </div>
                    
                    {selKelas && selMapel ? (
                        <div className="bg-white rounded-xl shadow border overflow-hidden overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-3 min-w-[200px] sticky left-0 bg-slate-50 border-r">Nama Siswa</th>
                                        {['S1','S2','S3','S4','S5'].map(h => <th key={h} className="p-2 text-center w-16">{h}</th>)}
                                        {!isKelas12 && <th className="p-2 text-center w-16">STS</th>}
                                        <th className="p-2 text-center w-16">SAS</th>
                                        <th className="p-2 text-center w-16 bg-slate-100 border-l border-r">Akhir</th>
                                        {isKoordIPA && <th className="p-2 text-center w-20 bg-green-50 text-green-700 border-l border-r">IPA</th>}
                                        {isKoordIPS && <th className="p-2 text-center w-20 bg-orange-50 text-orange-700 border-l border-r">IPS</th>}
                                        {isKelas12 && <th className="p-2 text-center w-20 bg-purple-50">PSAJ Praktik</th>}
                                        {isKelas12 && <th className="p-2 text-center w-20 bg-purple-50">PSAJ Tulis</th>}
                                    </tr>
                                </thead>
                                <tbody className="divide-y">
                                    {students.map(s => { 
                                        const nilai = (data.nilaiMapel || []).find(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(selMapel)) || {}; 
                                        const getVal = (f) => buffer[`${s.id}-${f}`] !== undefined ? buffer[`${s.id}-${f}`] : (nilai[f] !== undefined ? nilai[f] : ''); 
                                        const sumatif = ['s1','s2','s3','s4','s5'].map(k=>parseInt(getVal(k))||0).filter(v=>v>0); 
                                        const rerata = sumatif.length ? Math.round(sumatif.reduce((a,b)=>a+b,0)/sumatif.length) : 0; 
                                        const sts = parseInt(getVal('sts')) || 0; 
                                        const sas = parseInt(getVal('sas')) || 0; 
                                        
                                        let komps = [];
                                        if (rerata > 0) komps.push(rerata);
                                        if (!isKelas12 && sts > 0) komps.push(sts);
                                        if (sas > 0) komps.push(sas);
                                        const akhir = komps.length > 0 ? Math.round(komps.reduce((a,b)=>a+b,0) / komps.length) : 0;
                                        
                                        return (
                                            <tr key={s.id} className="hover:bg-slate-50">
                                                <td className="p-3 font-medium sticky left-0 bg-white border-r">{s.nama}</td>
                                                {['s1','s2','s3','s4','s5'].map(f => (
                                                    <td key={f} className="p-2 text-center">
                                                        <input type="number" className="w-14 text-center border rounded p-1 focus:ring-2 focus:ring-blue-500 outline-none transition" value={getVal(f)} onChange={e=>setBuffer(prev => ({...prev, [`${s.id}-${f}`]: e.target.value}))}/>
                                                    </td>
                                                ))}
                                                {!isKelas12 && (
                                                    <td className="p-2 text-center">
                                                        <input type="number" className="w-14 text-center border rounded p-1 focus:ring-2 focus:ring-blue-500 outline-none transition" value={getVal('sts')} onChange={e=>setBuffer(prev => ({...prev, [`${s.id}-sts`]: e.target.value}))}/>
                                                    </td>
                                                )}
                                                <td className="p-2 text-center">
                                                    <input type="number" className="w-14 text-center border rounded p-1 focus:ring-2 focus:ring-blue-500 outline-none transition" value={getVal('sas')} onChange={e=>setBuffer(prev => ({...prev, [`${s.id}-sas`]: e.target.value}))}/>
                                                </td>
                                                <td className="p-2 text-center font-bold bg-slate-50 border-l border-r text-emerald-600">{akhir}</td>
                                                {isKoordIPA && (
                                                    <td className="p-2 text-center font-bold bg-green-50 text-green-700 border-l border-r">
                                                        {getRataRataGabungan(s.id, ['biologi', 'fisika', 'kimia']) || '-'}
                                                    </td>
                                                )}
                                                {isKoordIPS && (
                                                    <td className="p-2 text-center font-bold bg-orange-50 text-orange-700 border-l border-r">
                                                        {getRataRataGabungan(s.id, ['sejarah', 'ekonomi', 'sosiologi', 'geografi']) || '-'}
                                                    </td>
                                                )}
                                                {isKelas12 && (
                                                    <td className="p-2 text-center">
                                                        <input type="number" className="w-16 text-center border rounded p-1 focus:ring-2 focus:ring-purple-500 outline-none transition" value={getVal('psaj_praktik')} onChange={e=>setBuffer(prev => ({...prev, [`${s.id}-psaj_praktik`]: e.target.value}))}/>
                                                    </td>
                                                )}
                                                {isKelas12 && (
                                                    <td className="p-2 text-center">
                                                        <input type="number" className="w-16 text-center border rounded p-1 focus:ring-2 focus:ring-purple-500 outline-none transition" value={getVal('psaj_tulis')} onChange={e=>setBuffer(prev => ({...prev, [`${s.id}-psaj_tulis`]: e.target.value}))}/>
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    ) : ( 
                        <div className="text-center p-12 bg-white rounded-xl border border-dashed text-slate-400">
                            <Icon name="arrow-up-circle" size={48} className="mb-4 text-slate-300 mx-auto"/>
                            <p className="text-lg font-medium">Silakan pilih Kelas dan Mata Pelajaran</p>
                        </div> 
                    )}
                </div>
            )
        };

        const InputEkskul = ({ data, setData, notify, user }) => { 
            const [selKelas, setSelKelas] = useState(''); const [buffer, setBuffer] = useState({});
            const fileInputRef = useRef(null);
            
            const availableClasses = useMemo(() => { 
                if (user.role === 'admin') return data.kelas || []; 
                
                let profiles = [];
                let primaryMatch = null;
                if (user.id && String(user.id).startsWith('usr-g-')) { primaryMatch = (data.guru || []).find(g => String(g.id) === String(user.id.replace('usr-g-', ''))); }
                if (!primaryMatch && user.nip && String(user.nip).trim() !== '' && String(user.nip).trim() !== '-') { primaryMatch = (data.guru || []).find(g => String(g.nip).trim() === String(user.nip).trim()); }
                if (!primaryMatch && user.nama) { primaryMatch = (data.guru || []).find(g => g.nama && String(g.nama).trim().toLowerCase() === String(user.nama).trim().toLowerCase()); }

                if (primaryMatch) {
                    profiles = (data.guru || []).filter(g => {
                        const hasValidNip = primaryMatch.nip && String(primaryMatch.nip).trim() !== '-' && String(primaryMatch.nip).trim() !== '';
                        const sameNip = hasValidNip && g.nip && String(g.nip).trim() === String(primaryMatch.nip).trim();
                        const hasValidName = primaryMatch.nama && String(primaryMatch.nama).trim() !== '';
                        const sameName = hasValidName && g.nama && String(g.nama).trim().toLowerCase() === String(primaryMatch.nama).trim().toLowerCase();
                        return sameNip || sameName;
                    });
                }

                return komps.length > 0 ? Math.round(komps.reduce((a,b)=>a+b,0) / komps.length) : 0;
            };

            const getRataRataGabunganLeger = (siswaId, mapelArray) => {
                const scores = mapelArray.map(m => getAkhirForMapelLeger(siswaId, m)).filter(score => score > 0);
                if (scores.length === 0) return 0;
                return Math.round(scores.reduce((a,b) => a+b, 0) / scores.length);
            };

            const downloadExcel = () => { 
                if (!selKelas || !selMapel) return notify('Pilih Kelas dan Mapel terlebih dahulu', 'error');
                if (students.length === 0) return notify('Tidak ada siswa di kelas ini', 'error');

                const mapelName = availableMapel.find(m => String(m.id) === String(selMapel))?.nama || 'Mapel';

                let headers = ['NO', 'NAMA SISWA', 'S1', 'S2', 'S3', 'S4', 'S5', 'RERATA'];
                if (!isKelas12) headers.push('STS');
                headers.push('SAS', 'AKHIR');
                if (isKoordIPA) headers.push('IPA');
                if (isKoordIPS) headers.push('IPS');
                headers.push('PREDIKAT');
                if (isKelas12) headers.push('PSAJ PRAKTIK', 'PSAJ TULIS');

                const rows = students.map((s, i) => {
                    const val = (data.nilaiMapel || []).find(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(selMapel)) || {};
                    const sum = [val.s1, val.s2, val.s3, val.s4, val.s5].map(v => parseInt(v) || 0).filter(v => v > 0);
                    const rerata = sum.length ? Math.round(sum.reduce((a, b) => a + b, 0) / sum.length) : 0;
                    
                    const stsVal = parseInt(val.sts) || 0;
                    const sasVal = parseInt(val.sas) || 0;
                    
                    let komps = [];
                    if (rerata > 0) komps.push(rerata);
                    if (!isKelas12 && stsVal > 0) komps.push(stsVal);
                    if (sasVal > 0) komps.push(sasVal);
                    const akhir = komps.length > 0 ? Math.round(komps.reduce((a,b)=>a+b,0) / komps.length) : 0;
                    
                    let predikat = 'D';
                    if (akhir >= 92) predikat = 'A';
                    else if (akhir >= 83) predikat = 'B';
                    else if (akhir >= 75) predikat = 'C';

                    const rowData = [
                        i + 1,
                        s.nama,
                        val.s1 !== undefined ? val.s1 : '',
                        val.s2 !== undefined ? val.s2 : '',
                        val.s3 !== undefined ? val.s3 : '',
                        val.s4 !== undefined ? val.s4 : '',
                        val.s5 !== undefined ? val.s5 : '',
                        rerata
                    ];
                    
                    if (!isKelas12) rowData.push(val.sts !== undefined ? val.sts : '');
                    rowData.push(val.sas !== undefined ? val.sas : '', akhir);
                    
                    if (isKoordIPA) rowData.push(getRataRataGabunganLeger(s.id, ['biologi', 'fisika', 'kimia']) || '');
                    if (isKoordIPS) rowData.push(getRataRataGabunganLeger(s.id, ['sejarah', 'ekonomi', 'sosiologi', 'geografi']) || '');
                    
                    rowData.push(predikat);

                        rowData.push(val.psaj_praktik !== undefined ? val.psaj_praktik : '', val.psaj_tulis !== undefined ? val.psaj_tulis : '');
                    }

                    return rowData;
                });

                const wb = XLSX.utils.book_new(); 
                const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]); 
                XLSX.utils.book_append_sheet(wb, ws, "Leger Nilai"); 
                XLSX.writeFile(wb, `Leger_Nilai_${selKelas}_${mapelName.replace(/[^a-zA-Z0-9]/g, '_')}.xlsx`);
            };
            
            return (
                <div className="space-y-6 animate-fade">

                    <div className="grid grid-cols-2 gap-4"><select className="p-3 border rounded-lg bg-white shadow-sm" value={selKelas} onChange={e=>setSelKelas(e.target.value)}><option value="">-- Pilih Kelas --</option>{filteredKelas.map(k=><option key={k.id} value={k.nama}>{k.nama}</option>)}</select><select className="p-3 border rounded-lg bg-white shadow-sm" value={selMapel} onChange={e=>setSelMapel(e.target.value)} disabled={!selKelas}><option value="">-- Pilih Mata Pelajaran --</option>{availableMapel.map(m=><option key={m.id} value={m.id}>{m.urutan_per_kelas && m.urutan_per_kelas[selKelas] !== undefined ? m.urutan_per_kelas[selKelas] : m.urutan}. {m.nama}</option>)}</select></div>
                    {selKelas && selMapel ? (<div className="bg-white rounded-xl shadow border overflow-hidden overflow-x-auto"><table className="w-full text-sm text-left"><thead className="bg-slate-50 border-b text-center"><tr><th className="p-3 w-10">No</th><th className="p-3 text-left">Nama Siswa</th><th className="p-3 w-12">S1</th><th className="p-3 w-12">S2</th><th className="p-3 w-12">S3</th><th className="p-3 w-12">S4</th><th className="p-3 w-12">S5</th><th className="p-3 w-16 bg-blue-50 border-l border-r">Rerata</th>{!isKelas12 && <th className="p-3 w-16">STS</th>}<th className="p-3 w-16">SAS</th><th className="p-3 w-16 bg-emerald-50 border-l">Akhir</th>{isKoordIPA && <th className="p-3 w-16 bg-green-50 text-green-700">IPA</th>}{isKoordIPS && <th className="p-3 w-16 bg-orange-50 text-orange-700">IPS</th>}<th className="p-3 w-16 border-r border-l">Pred</th>{isKelas12 && <th className="p-3 w-16 bg-purple-50 border-r">PSAJ Praktik</th>}{isKelas12 && <th className="p-3 w-16 bg-purple-50 border-r">PSAJ Tulis</th>}</tr></thead><tbody className="divide-y text-center">{students.map((s, i) => { const val = (data.nilaiMapel || []).find(n => String(n.siswa_id) === String(s.id) && String(n.mapel_id) === String(selMapel)) || {}; const sum = [val.s1,val.s2,val.s3,val.s4,val.s5].map(v=>parseInt(v)||0).filter(v=>v>0); const rerata = sum.length ? Math.round(sum.reduce((a,b)=>a+b,0)/sum.length) : 0; const stsVal = parseInt(val.sts) || 0; const sasVal = parseInt(val.sas) || 0; let komps = []; if (rerata > 0) komps.push(rerata); if (!isKelas12 && stsVal > 0) komps.push(stsVal); if (sasVal > 0) komps.push(sasVal); const akhir = komps.length > 0 ? Math.round(komps.reduce((a,b)=>a+b,0) / komps.length) : 0; let predikat = 'D'; if(akhir >= 92) predikat = 'A'; else if(akhir >= 83) predikat = 'B'; else if(akhir >= 75) predikat = 'C'; return (<tr key={s.id} className="hover:bg-slate-50"><td className="p-3 text-slate-500">{i+1}</td><td className="p-3 text-left font-medium">{s.nama}</td><td className="p-3">{val.s1||'-'}</td><td className="p-3">{val.s2||'-'}</td><td className="p-3">{val.s3||'-'}</td><td className="p-3">{val.s4||'-'}</td><td className="p-3">{val.s5||'-'}</td><td className="p-3 font-bold bg-blue-50 border-l border-r text-blue-700">{rerata}</td>{!isKelas12 && <td className="p-3">{val.sts||'-'}</td>}<td className="p-3">{val.sas||'-'}</td><td className="p-3 font-bold bg-emerald-50 text-emerald-700 border-l">{akhir}</td>{isKoordIPA && <td className="p-3 font-bold bg-green-50 text-green-700">{getRataRataGabunganLeger(s.id, ['biologi', 'fisika', 'kimia']) || '-'}</td>}{isKoordIPS && <td className="p-3 font-bold bg-orange-50 text-orange-700">{getRataRataGabunganLeger(s.id, ['sejarah', 'ekonomi', 'sosiologi', 'geografi']) || '-'}</td>}<td className="p-3 font-bold border-r border-l">{predikat}</td>{isKelas12 && <td className="p-3 font-medium text-purple-700 bg-purple-50/30 border-r">{val.psaj_praktik||'-'}</td>}{isKelas12 && <td className="p-3 font-medium text-purple-700 bg-purple-50/30 border-r">{val.psaj_tulis||'-'}</td>}</tr>); })}</tbody></table></div>) : <div className="text-center p-12 bg-white rounded-xl border border-dashed text-slate-400">Silakan pilih Kelas dan Mata Pelajaran untuk melihat Leger Nilai.</div>}
                </div>
            );
        };

        const Perangkingan = ({ data, notify, user }) => {
